<!DOCTYPE html>
<html lang="zh-Hant">

    <title>但以理書研經課程 | 富山平安福音堂</title>
    <style>

        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans TC', sans-serif; background: #f0f2f5; color: #333; }

        .navbar { background: linear-gradient(135deg, #1a237e, #283593); color: white; padding: 12px 24px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,0.15); }

        .auth-screen { min-height: 100vh; display: flex; justify-content: center; align-items: center; background: linear-gradient(135deg, #f5f7fa, #c3cfe2); }

        .lesson-card.coming-soon:hover { transform: none; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }

        .lesson-view { max-width: 900px; margin: 0 auto; padding: 24px; }

        .q-section { margin-bottom: 28px; }

        .quiz-result { margin-top: 16px; padding: 16px; border-radius: 8px; font-size: 18px; font-weight: bold; text-align: center; display: none; }
        .quiz-result.pass { background: #e8f5e9; color: #2e7d32; }
        .quiz-result.fail { background: #fff3e0; color: #e65100; }

        .coming-soon { text-align: center; padding: 60px 24px; color: #999; }

        .intro-section-header h3 { color: #1a237e; font-size: 16px; margin: 0; }
        .intro-section-header .arrow { font-size: 18px; transition: transform 0.3s; color: #666; }
        .intro-section-header .arrow.open { transform: rotate(180deg); }

        .intro-section-body .chiasm-box { background: #f0fff0; border: 1px solid #a5d6a7; border-radius: 8px; padding: 16px; margin: 12px 0; }

        .intro-section.appendix .intro-section-header h3 { color: #880e4f; }
        .bib-list { font-size: 13px; color: #555; }

        @media (max-width: 600px) {

            .hl-legend { flex-direction: column; gap: 8px; }
            .verse { font-size: 15px; }
            .intro-section-body { font-size: 14px; }
        }
    </style>
</head>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged, updateProfile, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCq-53c29i4TDDJUjL35R6QBSXvwlHkHUI",
  authDomain: "daniel-bible-study.firebaseapp.com",
  projectId: "daniel-bible-study",
  storageBucket: "daniel-bible-study.firebasestorage.app",
  messagingSenderId: "455825520749",
  appId: "1:455825520749:web:c1328bcc7ea4b39ff62764"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// ==========================================
// 從外部載入的課程資料
// ==========================================
const LESSONS = window.LESSONS_DATA;

// ==========================================
// STATE
// ==========================================
let currentUser = null;
let userData = {};
let currentLessonId = null;
let hlVerse = null;

// ==========================================
// AUTH
// ==========================================
function showMsg(id, text, type) {
    const el = document.getElementById(id);
    el.className = 'auth-msg ' + type;
    el.textContent = text;
    el.style.display = 'block';
}

window.switchAuthTab = function(tab) {
    document.querySelectorAll('.auth-tab').forEach((t,i) => {
        t.classList.toggle('active', (tab==='login' ? i===0 : i===1));
    });
    document.getElementById('login-form').style.display = tab==='login' ? 'block' : 'none';
    document.getElementById('register-form').style.display = tab==='register' ? 'block' : 'none';
};

window.doLogin = async function() {
    const email = document.getElementById('login-email').value.trim();
    const pw = document.getElementById('login-password').value;
    if(!email||!pw) return showMsg('login-msg','請填寫電郵和密碼','error');
    try { await signInWithEmailAndPassword(auth, email, pw); }
    catch(e) { showMsg('login-msg','登入失敗：'+e.message,'error'); }
};

window.doRegister = async function() {
    const name = document.getElementById('reg-name').value.trim();
    const email = document.getElementById('reg-email').value.trim();
    const pw = document.getElementById('reg-password').value;
    if(!name||!email||!pw) return showMsg('register-msg','請填寫所有欄位','error');
    if(pw.length<6) return showMsg('register-msg','密碼需至少6位','error');
    try {
        const cred = await createUserWithEmailAndPassword(auth, email, pw);
        await updateProfile(cred.user, { displayName: name });
        await setDoc(doc(db,'users',cred.user.uid), { displayName:name, email:email, progress:{}, highlights:{}, notes:{} });
    } catch(e) { showMsg('register-msg','註冊失敗：'+e.message,'error'); }
};

window.doForgotPassword = async function() {
    const email = document.getElementById('login-email').value.trim();
    if(!email) return showMsg('login-msg','請先填寫電郵地址，再點「忘記密碼」','error');
    try {
        await sendPasswordResetEmail(auth, email);
        showMsg('login-msg','重置密碼的電郵已發送到 '+email+'，請檢查收件箱（及垃圾郵件）。','success');
    } catch(e) { showMsg('login-msg','發送失敗：'+e.message,'error'); }
};

window.doLogout = async function() { await signOut(auth); };

onAuthStateChanged(auth, async (user) => {
    if(user) {
        currentUser = user;
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        document.getElementById('user-name').textContent = '👤 ' + (user.displayName || user.email);
        await loadUserData();
        renderDashboard();
    } else {
        currentUser = null;
        document.getElementById('auth-screen').style.display = 'flex';
        document.getElementById('app').style.display = 'none';
    }
});

// ==========================================
// FIRESTORE
// ==========================================
async function loadUserData() {
    try {
        const snap = await getDoc(doc(db,'users',currentUser.uid));
        if(snap.exists()) { userData = snap.data(); }
        else { userData = { displayName:currentUser.displayName, email:currentUser.email, progress:{}, highlights:{}, notes:{} }; await setDoc(doc(db,'users',currentUser.uid), userData); }
        if(!userData.progress) userData.progress = {};
        if(!userData.highlights) userData.highlights = {};
        if(!userData.notes) userData.notes = {};
    } catch(e) { console.error('Load error:', e); }
}
async function saveUserData() {
    if(!currentUser) return;
    try { await setDoc(doc(db,'users',currentUser.uid), userData, {merge:true}); }
    catch(e) { console.error('Save error:', e); }
}

// ==========================================
// DASHBOARD
// ==========================================
function renderDashboard() {
    const total = LESSONS.filter(l => !l.comingSoon).length;
    let done = 0, totalScore = 0, scored = 0;
    LESSONS.forEach(l => {
        const p = userData.progress[l.id];
        if(p && p.completed) done++;
        if(p && p.quizScore != null) { totalScore += p.quizScore; scored++; }
    });
    const pct = total > 0 ? Math.round(done/total*100) : 0;
    document.getElementById('prog-bar').style.width = pct+'%';
    document.getElementById('prog-bar').textContent = pct+'%';
    let statsHtml = `已完成：${done} / ${total} 課`;
    if(scored > 0) statsHtml += `&nbsp;&nbsp;|&nbsp;&nbsp;平均測驗分數：${Math.round(totalScore/scored)}%`;
    document.getElementById('prog-stats').innerHTML = statsHtml;

    const grid = document.getElementById('lesson-grid');
    grid.innerHTML = '';
    LESSONS.forEach(l => {
        const p = userData.progress[l.id] || {};
        const card = document.createElement('div');
        card.className = 'lesson-card' + (p.completed ? ' completed' : '') + (l.comingSoon ? ' coming-soon' : '');
        let statusHtml = '';
        if(l.comingSoon) statusHtml = '<span class="badge badge-locked">🔒 即將推出</span>';
        else if(p.completed) { statusHtml = '<span class="badge badge-done">✅ 已完成</span>'; if(p.quizScore!=null) statusHtml += `<span class="badge badge-score">測驗：${p.quizScore}%</span>`; }
        else statusHtml = '<span class="badge badge-wip">📖 進行中</span>';
        card.innerHTML = `<h3>${l.title}：${l.subtitle}</h3><div class="ref">${l.ref}</div><div class="desc">${l.description}</div><div>${statusHtml}</div>`;
        if(!l.comingSoon) card.onclick = () => openLesson(l.id);
        grid.appendChild(card);
    });
}

// ==========================================
// LESSON VIEW
// ==========================================
function openLesson(id) {
    currentLessonId = id;
    const lesson = LESSONS.find(l => l.id === id);
    if(!lesson || lesson.comingSoon) return;

    document.getElementById('dashboard-view').style.display = 'none';
    document.getElementById('lesson-view').style.display = 'block';
    document.getElementById('lv-header').innerHTML = `<h1>${lesson.title}：${lesson.subtitle}</h1><p>${lesson.ref} — ${lesson.description}</p>`;

    const tabLabel = document.getElementById('tab-label-scripture');
    tabLabel.textContent = lesson.isIntro ? '📖 課程內容' : '📖 經文';

    if(lesson.isIntro) renderIntroContent(lesson);
    else renderScripture(lesson);
    renderQuestions(lesson);
    renderQuiz(lesson);
    showLessonTab('scripture');
}

window.goBack = function() {
    document.getElementById('lesson-view').style.display = 'none';
    document.getElementById('dashboard-view').style.display = 'block';
    currentLessonId = null;
    renderDashboard();
};

document.getElementById('lv-tabs').addEventListener('click', (e) => {
    const tab = e.target.dataset?.tab;
    if(tab) showLessonTab(tab);
});

function showLessonTab(tab) {
    document.querySelectorAll('#lv-tabs .lesson-tab').forEach(t => t.classList.toggle('active', t.dataset.tab===tab));
    ['scripture','questions','quiz'].forEach(t => document.getElementById('tab-'+t).classList.toggle('active', t===tab));
    document.getElementById('hl-popup').style.display = 'none';
}

// ==========================================
// INTRO CONTENT TAB
// ==========================================
function renderIntroContent(lesson) {
    const container = document.getElementById('tab-scripture');
    const isRead = userData.progress[lesson.id]?.scriptureRead;

    let html = `<div class="intro-content">`;
    html += `<h2 style="color:#1a237e;margin-bottom:4px;">📖 ${lesson.chapterTitle}</h2>`;
    html += `<p style="color:#888;font-size:13px;margin-bottom:20px;">Dr. Wendy Widder (PhD, Near Eastern Studies) — 點擊各標題可展開/收合內容</p>`;

    lesson.sections.forEach((sec, i) => {
        const isOpen = sec.defaultOpen;
        const appendixClass = sec.isAppendix ? ' appendix' : '';
        html += `<div class="intro-section${appendixClass}">
            <div class="intro-section-header" onclick="toggleIntroSection(${i})">
                <h3>${sec.icon} ${sec.title}</h3>
                <span class="arrow${isOpen?' open':''}" id="arrow-${i}">▼</span>
            </div>
            <div class="intro-section-body${isOpen?' open':''}" id="isec-${i}">${sec.html}</div>
        </div>`;
    });

    html += `<button class="btn-mark-read${isRead?' done':''}" onclick="markRead()" id="btn-read">${isRead?'✅ 已完成閱讀':'📖 標記已完成閱讀'}</button>`;
    html += `</div>`;
    container.innerHTML = html;
}

window.toggleIntroSection = function(i) {
    const body = document.getElementById('isec-'+i);
    const arrow = document.getElementById('arrow-'+i);
    if(body && arrow) {
        body.classList.toggle('open');
        arrow.classList.toggle('open');
    }
};

// ==========================================
// SCRIPTURE TAB
// ==========================================
function renderScripture(lesson) {
    const container = document.getElementById('tab-scripture');
    if(lesson.verses.length === 0) {
        container.innerHTML = '<div class="coming-soon"><div class="icon">📖</div><h3>經文內容準備中</h3><p>請稍候，內容即將更新。</p></div>';
        return;
    }
    const highlights = (userData.highlights && userData.highlights[lesson.id]) || {};
    const isRead = userData.progress[lesson.id]?.scriptureRead;

    let html = `<div class="scripture-box">`;
    html += `<h2>📖 ${lesson.chapterTitle || ''}</h2>`;
    html += `<div class="sub">和合本修訂版 (RCUV) — ${lesson.ref}</div>`;
    html += `<div class="hl-legend">
        <b>螢光筆：</b>
        <span><span class="hl-dot" style="background:#fff9c4;border:1px solid #f9a825"></span> 重要</span>
        <span><span class="hl-dot" style="background:#bbdefb;border:1px solid #42a5f5"></span> 不明白</span>
        <span><span class="hl-dot" style="background:#c8e6c9;border:1px solid #66bb6a"></span> 感動/有用</span>
        <span style="color:#999;font-size:12px">（點擊經文即可標記）</span>
    </div>`;
    html += `<div class="verses-area">`;
    lesson.verses.forEach((v, i) => {
        const vnum = i + 1;
        const hlClass = highlights[vnum] ? ' hl-'+highlights[vnum] : '';
        html += `<span class="verse${hlClass}" data-v="${vnum}"><sup>${vnum}</sup>${v}</span>`;
    });
    html += `</div>`;
    html += `<button class="btn-mark-read${isRead?' done':''}" onclick="markRead()" id="btn-read">${isRead?'✅ 已完成閱讀':'📖 標記已完成閱讀'}</button>`;
    html += `</div>`;
    container.innerHTML = html;

    container.querySelectorAll('.verse').forEach(el => {
        el.addEventListener('click', (e) => {
            e.stopPropagation();
            hlVerse = parseInt(el.dataset.v);
            const popup = document.getElementById('hl-popup');
            const rect = el.getBoundingClientRect();
            popup.style.display = 'block';
            popup.style.position = 'fixed';
            popup.style.top = (rect.bottom + 4) + 'px';
            popup.style.left = Math.min(rect.left, window.innerWidth - 280) + 'px';
        });
    });
}

document.addEventListener('click', (e) => {
    if(!e.target.closest('.verse') && !e.target.closest('.hl-popup')) {
        document.getElementById('hl-popup').style.display = 'none';
    }
});

window.setHL = async function(color) {
    if(!currentLessonId || hlVerse == null) return;
    if(!userData.highlights[currentLessonId]) userData.highlights[currentLessonId] = {};
    if(color) userData.highlights[currentLessonId][hlVerse] = color;
    else delete userData.highlights[currentLessonId][hlVerse];
    const el = document.querySelector(`.verse[data-v="${hlVerse}"]`);
    if(el) { el.classList.remove('hl-yellow','hl-blue','hl-green'); if(color) el.classList.add('hl-'+color); }
    document.getElementById('hl-popup').style.display = 'none';
    await saveUserData();
};

window.markRead = async function() {
    if(!currentLessonId) return;
    if(!userData.progress[currentLessonId]) userData.progress[currentLessonId] = {};
    userData.progress[currentLessonId].scriptureRead = true;
    const btn = document.getElementById('btn-read');
    btn.textContent = '✅ 已完成閱讀'; btn.classList.add('done');
    await saveUserData();
};

// ==========================================
// QUESTIONS TAB
// ==========================================
function renderQuestions(lesson) {
    const container = document.getElementById('tab-questions');
    if(!lesson.questions) {
        container.innerHTML = '<div class="coming-soon"><div class="icon">✏️</div><h3>討論問題準備中</h3><p>請稍候，內容即將更新。</p></div>';
        return;
    }
    const notes = (userData.notes && userData.notes[lesson.id]) || {};
    const sections = [
        { key:'observation', title:'一、觀察與整理', cls:'', icon:'🔍' },
        { key:'interpretation', title:'二、解釋與深入討論', cls:'reflection', icon:'💡' },
        { key:'application', title:'三、生活應用與反思', cls:'sharing', icon:'❤️' }
    ];
    let html = '<div class="questions-box">';
    sections.forEach(sec => {
        const qs = lesson.questions[sec.key];
        if(!qs || qs.length === 0) return;
        html += `<div class="q-section ${sec.cls}"><h3>${sec.icon} ${sec.title}</h3>`;
        qs.forEach((q, i) => {
            const saved = notes[q.id] || '';
            html += `<div class="q-item ${sec.cls}">
                <div class="q-text">${i+1}. ${q.text}</div>
                ${q.hint ? '<div class="q-hint">'+q.hint+'</div>' : ''}
                <textarea data-qid="${q.id}" placeholder="在此寫下你的想法和筆記...">${saved}</textarea>
                <div class="save-ind" id="save-${q.id}">✓ 已儲存</div>
                ${q.reference ? `<button class="ref-toggle" onclick="toggleRef('${q.id}')">📋 查看參考答案</button><div class="ref-answer" id="ref-${q.id}">${q.reference}</div>` : ''}
            </div>`;
        });
        html += '</div>';
    });
    html += '</div>';
    container.innerHTML = html;

    let saveTimers = {};
    container.querySelectorAll('textarea').forEach(ta => {
        ta.addEventListener('input', () => {
            const qid = ta.dataset.qid;
            clearTimeout(saveTimers[qid]);
            saveTimers[qid] = setTimeout(async () => {
                if(!userData.notes[lesson.id]) userData.notes[lesson.id] = {};
                userData.notes[lesson.id][qid] = ta.value;
                await saveUserData();
                const ind = document.getElementById('save-'+qid);
                if(ind) { ind.classList.add('show'); setTimeout(()=>ind.classList.remove('show'), 2000); }
            }, 1200);
        });
    });
}

window.toggleRef = function(qid) {
    const el = document.getElementById('ref-'+qid);
    if(el) el.classList.toggle('show');
};

// ==========================================
// QUIZ TAB
// ==========================================
let quizAnswers = {};
let quizSubmitted = false;

function renderQuiz(lesson) {
    quizAnswers = {}; quizSubmitted = false;
    const container = document.getElementById('tab-quiz');
    if(!lesson.quiz || lesson.quiz.length === 0) {
        container.innerHTML = '<div class="coming-soon"><div class="icon">📝</div><h3>測驗準備中</h3><p>請稍候，測驗即將更新。</p></div>';
        return;
    }
    const prevScore = userData.progress[lesson.id]?.quizScore;
    let html = '<div class="quiz-box"><h2>📝 課後測驗</h2>';
    if(prevScore != null) html += `<p style="color:#43a047;margin:8px 0">上次成績：${prevScore}%</p>`;
    html += '<p style="color:#888;font-size:13px;margin-bottom:16px">請選擇最佳答案：</p>';
    lesson.quiz.forEach((q, qi) => {
        html += `<div class="quiz-q" id="qq-${qi}"><h4>${qi+1}. ${q.q}</h4>`;
        q.opts.forEach((opt, oi) => {
            html += `<label class="quiz-opt" data-qi="${qi}" data-oi="${oi}" onclick="pickQuiz(${qi},${oi})">${String.fromCharCode(65+oi)}. ${opt}</label>`;
        });
        html += '</div>';
    });
    html += `<button class="btn-quiz" id="btn-submit-quiz" onclick="submitQuiz()">提交答案</button>`;
    html += `<div class="quiz-result" id="quiz-result"></div></div>`;
    container.innerHTML = html;
}

window.pickQuiz = function(qi, oi) {
    if(quizSubmitted) return;
    quizAnswers[qi] = oi;
    document.querySelectorAll(`[data-qi="${qi}"]`).forEach(el => {
        el.classList.toggle('selected', parseInt(el.dataset.oi) === oi);
    });
};

window.submitQuiz = async function() {
    if(quizSubmitted) return;
    const lesson = LESSONS.find(l => l.id === currentLessonId);
    if(!lesson) return;
    const total = lesson.quiz.length;
    if(Object.keys(quizAnswers).length < total) {
        const result = document.getElementById('quiz-result');
        result.style.display = 'block';
        result.className = 'quiz-result fail';
        result.textContent = '⚠️ 請回答所有問題！';
        setTimeout(() => { result.style.display = 'none'; }, 2000);
        return;
    }
    quizSubmitted = true;
    let correct = 0;
    lesson.quiz.forEach((q, qi) => {
        const picked = quizAnswers[qi];
        const isCorrect = picked === q.ans;
        if(isCorrect) correct++;
        document.querySelectorAll(`[data-qi="${qi}"]`).forEach(el => {
            const oi = parseInt(el.dataset.oi);
            if(oi === q.ans) el.classList.add('correct');
            else if(oi === picked && !isCorrect) el.classList.add('wrong');
        });
    });
    const score = Math.round(correct/total*100);
    const result = document.getElementById('quiz-result');
    result.style.display = 'block';
    result.className = 'quiz-result ' + (score >= 60 ? 'pass' : 'fail');
    result.textContent = `你的分數：${score}%（${correct}/${total}）` + (score >= 60 ? ' 🎉' : ' — 請再加油！');
    document.getElementById('btn-submit-quiz').disabled = true;

    if(!userData.progress[currentLessonId]) userData.progress[currentLessonId] = {};
    userData.progress[currentLessonId].quizScore = score;
    userData.progress[currentLessonId].completed = true;
    userData.progress[currentLessonId].completedAt = new Date().toISOString();
    await saveUserData();
};

</script>
