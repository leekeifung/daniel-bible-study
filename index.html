<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>但以理書研經課程 | 富山平安福音堂</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans TC', sans-serif; background: #f0f2f5; color: #333; }

.navbar {
    background: linear-gradient(135deg, #1a237e, #3949ab);
    color: white;
    padding: 10px 16px;
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: space-between;
    gap: 6px;
    position: sticky;
    top: 0;
    z-index: 100;
}
        .navbar-brand { font-size: 18px; font-weight: bold; }
        .navbar-user { display: flex; align-items: center; gap: 12px; font-size: 14px; }
        .btn-logout { background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.3); color: white; padding: 6px 16px; border-radius: 20px; cursor: pointer; font-size: 14px; }
        .btn-logout:hover { background: rgba(255,255,255,0.3); }
.btn-back-nav {
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.3);
    color: white;
    padding: 6px 14px;
    border-radius: 16px;
    cursor: pointer;
    font-size: 14px;
    white-space: nowrap;
    display: none;
}
.btn-back-nav:hover { background: rgba(255,255,255,0.3); }

        .auth-screen { min-height: 100vh; display: flex; justify-content: center; align-items: center; background: linear-gradient(135deg, #f5f7fa, #c3cfe2); }
        .auth-card { background: white; border-radius: 16px; overflow: hidden; width: 420px; max-width: 95vw; box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
        .auth-header { background: linear-gradient(135deg, #1a237e, #283593); color: white; padding: 32px; text-align: center; }
        .auth-header h1 { font-size: 24px; margin-bottom: 8px; }
        .auth-header p { opacity: 0.8; font-size: 14px; }
        .auth-tabs { display: flex; border-bottom: 2px solid #e0e0e0; }
        .auth-tab { flex: 1; padding: 14px; text-align: center; cursor: pointer; font-weight: 600; color: #666; border-bottom: 3px solid transparent; transition: 0.3s; }
        .auth-tab.active { color: #1a237e; border-bottom-color: #1a237e; }
        .auth-form { padding: 24px; }
        .auth-form input { width: 100%; padding: 12px 16px; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; margin-bottom: 12px; }
        .auth-form input:focus { outline: none; border-color: #1a237e; box-shadow: 0 0 0 3px rgba(26,35,126,0.1); }
        .auth-form button { width: 100%; padding: 14px; background: #1a237e; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; }
        .auth-form button:hover { background: #283593; }
        .auth-msg { font-size: 13px; margin-bottom: 12px; padding: 8px; border-radius: 6px; display: none; }
        .auth-msg.error { background: #ffebee; color: #c62828; display: block; }
        .auth-msg.success { background: #e8f5e9; color: #2e7d32; display: block; }
        .forgot-pw { text-align: center; margin-top: 8px; }
        .forgot-pw a { color: #1a237e; font-size: 13px; cursor: pointer; text-decoration: underline; }

        .dashboard { max-width: 1200px; margin: 0 auto; padding: 24px; }
        .progress-card { background: white; border-radius: 12px; padding: 24px; margin-bottom: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .progress-dual { display: flex; gap: 24px; flex-wrap: wrap; margin-top: 16px; }
        .progress-col { flex: 1; min-width: 220px; }
        .progress-label { font-size: 14px; color: #555; margin-bottom: 6px; font-weight: 600; }
        .progress-bar-bg { background: #e0e0e0; border-radius: 20px; height: 28px; overflow: hidden; margin: 8px 0; }
        .progress-bar-fill { background: linear-gradient(90deg, #43a047, #66bb6a); height: 100%; border-radius: 20px; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 13px; transition: width 0.5s; min-width: 40px; }
        .progress-bar-fill.quiz-bar { background: linear-gradient(90deg, #1a237e, #5c6bc0); }
        .progress-bar-fill.reading-bar { background: linear-gradient(90deg, #ff8f00, #ffb74d); }
        .progress-stats { color: #666; font-size: 13px; margin-top: 2px; }
        .section-title { font-size: 20px; margin-bottom: 16px; }

        .lesson-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
        .lesson-card { background: white; border-radius: 12px; padding: 20px; border-left: 4px solid #1a237e; box-shadow: 0 2px 8px rgba(0,0,0,0.06); cursor: pointer; transition: 0.3s; }
        .lesson-card:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,0,0.1); }
        .lesson-card.completed { border-left-color: #43a047; }
        .lesson-card.coming-soon { opacity: 0.55; cursor: default; border-left-color: #bbb; }
        .lesson-card.coming-soon:hover { transform: none; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .lesson-card.self-study { border-left-color: #ff8f00; }
        .lesson-card.self-study.coming-soon { border-left-color: #ccc; }
        .lesson-card h3 { color: #1a237e; font-size: 16px; margin-bottom: 4px; }
        .lesson-card .lesson-date { font-size: 12px; color: #999; margin-bottom: 6px; }
        .lesson-card .ref { color: #888; font-size: 13px; margin-bottom: 8px; }
        .lesson-card .desc { color: #555; font-size: 14px; margin-bottom: 12px; line-height: 1.5; }
        .lesson-status { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
        .badge { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 12px; font-weight: 600; }
        .badge-done { background: #e8f5e9; color: #2e7d32; }
        .badge-read { background: #e8f5e9; color: #2e7d32; }
        .badge-unread { background: #f5f5f5; color: #999; }
        .badge-wip { background: #fff3e0; color: #e65100; }
        .badge-score { background: #e3f2fd; color: #1565c0; }
        .badge-noquiz { background: #f5f5f5; color: #aaa; }
        .badge-locked { background: #f5f5f5; color: #999; }
        .badge-self { background: #fff3e0; color: #e65100; }

        .lesson-view { max-width: 900px; margin: 0 auto; padding: 24px; }
        .btn-back { background: none; border: 1px solid #1a237e; color: #1a237e; padding: 6px 16px; border-radius: 20px; cursor: pointer; font-size: 13px; margin-bottom: 12px; display: inline-block; }
        .btn-back:hover { background: #1a237e; color: white; }
        .lesson-header { background: white; border-radius: 12px; padding: 24px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .lesson-header h1 { color: #1a237e; font-size: 22px; }
        .lesson-header p { color: #666; margin-top: 4px; }

        .lesson-tabs { display: flex; background: white; border-radius: 12px; overflow: hidden; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .lesson-tab { flex: 1; padding: 14px; text-align: center; cursor: pointer; font-weight: 600; color: #666; border-bottom: 3px solid transparent; transition: 0.3s; font-size: 15px; }
        .lesson-tab.active { color: #1a237e; border-bottom-color: #1a237e; background: #f5f7ff; }
        .lesson-tab:hover { background: #f5f5f5; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .scripture-box { background: white; border-radius: 12px; padding: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .scripture-box h2 { color: #1a237e; font-size: 18px; margin-bottom: 4px; }
        .scripture-box .sub { color: #888; font-size: 13px; margin-bottom: 16px; }
        .hl-legend { display: flex; gap: 16px; flex-wrap: wrap; padding: 12px; background: #f9f9f9; border-radius: 8px; font-size: 13px; margin-bottom: 16px; align-items: center; }
        .hl-legend span { display: flex; align-items: center; gap: 4px; }
        .hl-dot { width: 14px; height: 14px; border-radius: 3px; display: inline-block; }

        .verse { padding: 6px 8px; margin: 2px 0; border-radius: 6px; cursor: pointer; transition: background-color 0.2s; display: block; line-height: 1.9; font-size: 20px; position: relative; }
        .verse:hover { outline: 2px solid #ccc; }
        .verse sup { color: #1a237e; font-weight: bold; margin-right: 4px; font-size: 11px; }
        .verse.hl-yellow { background: #fff9c4 !important; }
        .verse.hl-blue { background: #bbdefb !important; }
        .verse.hl-green { background: #c8e6c9 !important; }

        .hl-popup { position: absolute; background: white; border-radius: 10px; box-shadow: 0 4px 20px rgba(0,0,0,0.18); padding: 8px; display: none; z-index: 200; white-space: nowrap; }
        .hl-popup button { padding: 6px 12px; margin: 2px; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 500; }
        .hl-popup .hy { background: #fff9c4; } .hl-popup .hy:hover { background: #fff176; }
        .hl-popup .hb { background: #bbdefb; } .hl-popup .hb:hover { background: #90caf9; }
        .hl-popup .hg { background: #c8e6c9; } .hl-popup .hg:hover { background: #a5d6a7; }
        .hl-popup .hx { background: #ffcdd2; } .hl-popup .hx:hover { background: #ef9a9a; }

        .btn-mark-read { margin-top: 20px; padding: 12px 24px; background: #43a047; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 15px; font-weight: bold; }
        .btn-mark-read:hover { background: #388e3c; }
        .btn-mark-read.done { background: #a5d6a7; color: #1b5e20; }

        .questions-box { background: white; border-radius: 12px; padding: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .q-section { margin-bottom: 28px; }
        .q-section h3 { color: #1a237e; font-size: 17px; padding-bottom: 8px; border-bottom: 2px solid #e0e0e0; margin-bottom: 16px; }
        .q-section.reflection h3 { color: #00897b; }
        .q-section.sharing h3 { color: #e65100; }
        .q-item { margin-bottom: 20px; padding: 16px; background: #f9fafb; border-radius: 8px; border-left: 3px solid #1a237e; }
        .q-item.reflection { border-left-color: #00897b; }
        .q-item.sharing { border-left-color: #e65100; }
        .q-item .q-text { font-size: 18px; font-weight: 600; margin-bottom: 6px; line-height: 1.6; }
        .q-item .q-hint { font-size: 14px; color: #888; margin-bottom: 10px; font-style: italic; }
        .q-item textarea { width: 100%; min-height: 80px; padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 18px; resize: vertical; font-family: inherit; line-height: 1.6; }
        .q-item textarea:focus { outline: none; border-color: #1a237e; }
        .save-ind { font-size: 12px; color: #43a047; margin-top: 4px; opacity: 0; transition: opacity 0.3s; }
        .save-ind.show { opacity: 1; }
        .ref-toggle { background: none; border: 1px solid #7986cb; color: #3f51b5; padding: 4px 12px; border-radius: 12px; cursor: pointer; font-size: 12px; margin-top: 8px; }
        .ref-toggle:hover { background: #e8eaf6; }
        .ref-answer { display: none; margin-top: 10px; padding: 12px; background: #e8eaf6; border-radius: 6px; font-size: 13px; color: #333; line-height: 1.8; }
        .ref-answer.show { display: block; }

        .quiz-box { background: white; border-radius: 12px; padding: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .quiz-q { margin-bottom: 24px; padding: 16px; background: #f9fafb; border-radius: 8px; }
        .quiz-q h4 { margin-bottom: 12px; font-size: 18px; line-height: 1.6; }
        .quiz-opt { display: block; padding: 10px 14px; margin: 4px 0; border: 1px solid #ddd; border-radius: 8px; cursor: pointer; transition: 0.2s; font-size: 18px; }
        .quiz-opt:hover { background: #f0f0f0; }
        .quiz-opt.selected { background: #e3f2fd; border-color: #1a237e; }
        .quiz-opt.correct { background: #e8f5e9 !important; border-color: #43a047 !important; }
        .quiz-opt.wrong { background: #ffebee !important; border-color: #d32f2f !important; }
        .btn-quiz { padding: 12px 32px; background: #1a237e; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; margin-top: 12px; }
        .btn-quiz:hover { background: #283593; }
        .btn-quiz:disabled { background: #bbb; cursor: default; }
        .quiz-result { margin-top: 16px; padding: 16px; border-radius: 8px; font-size: 18px; font-weight: bold; text-align: center; display: none; }
        .quiz-result.pass { background: #e8f5e9; color: #2e7d32; }
        .quiz-result.fail { background: #fff3e0; color: #e65100; }

        /* NEW: Fill-in-blank quiz */
        .fill-input { width: 100%; padding: 10px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; margin-top: 8px; font-family: inherit; }
        .fill-input:focus { outline: none; border-color: #1a237e; box-shadow: 0 0 0 3px rgba(26,35,126,0.1); }
        .fill-input.correct { border-color: #43a047 !important; background: #e8f5e9 !important; }
        .fill-input.wrong { border-color: #d32f2f !important; background: #ffebee !important; }
        .fill-correct-ans { color: #2e7d32; font-size: 13px; margin-top: 6px; font-weight: 500; }

        /* NEW: Matching quiz */
        .match-grid { margin-top: 12px; }
        .match-row { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; padding: 10px 14px; background: #f5f5f5; border-radius: 8px; }
        .match-left { font-weight: 600; min-width: 100px; font-size: 14px; }
        .match-arrow { color: #999; font-size: 16px; }
        .match-select { flex: 1; padding: 8px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; font-family: inherit; background: white; }
        .match-select:focus { outline: none; border-color: #1a237e; }
        .match-select.correct { border-color: #43a047 !important; background: #e8f5e9 !important; }
        .match-select.wrong { border-color: #d32f2f !important; background: #ffebee !important; }

        .coming-soon { text-align: center; padding: 60px 24px; color: #999; }
        .coming-soon .icon { font-size: 48px; margin-bottom: 16px; }
        .coming-soon h3 { color: #666; margin-bottom: 8px; }

        .intro-content { background: white; border-radius: 12px; padding: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .intro-section { margin-bottom: 24px; border: 1px solid #e0e0e0; border-radius: 10px; overflow: hidden; }
        .intro-section-header { background: linear-gradient(135deg, #e8eaf6, #f5f5f5); padding: 14px 18px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; user-select: none; }
        .intro-section-header h3 { color: #1a237e; font-size: 16px; margin: 0; }
        .intro-section-header .arrow { font-size: 18px; transition: transform 0.3s; color: #666; }
        .intro-section-header .arrow.open { transform: rotate(180deg); }
        .intro-section-body { padding: 16px 18px; line-height: 1.9; font-size: 15px; display: none; }
        .intro-section-body.open { display: block; }
        .intro-section-body p { margin-bottom: 12px; }
        .intro-section-body ul, .intro-section-body ol { margin: 8px 0 12px 20px; }
        .intro-section-body li { margin-bottom: 6px; line-height: 1.7; }
        .intro-section-body strong { color: #1a237e; }
        .intro-section-body .chiasm-box { background: #f0fff0; border: 1px solid #a5d6a7; border-radius: 8px; padding: 16px; margin: 12px 0; }
        .intro-section-body .chiasm-box .level { padding: 2px 0; }
        .intro-section-body .highlight-box { background: #fff8e1; border-left: 4px solid #ff8f00; padding: 12px 16px; margin: 12px 0; border-radius: 0 8px 8px 0; }
        .intro-section.appendix .intro-section-header { background: linear-gradient(135deg, #fce4ec, #f5f5f5); }
        .intro-section.appendix .intro-section-header h3 { color: #880e4f; }
        .bib-list { font-size: 13px; color: #555; }
        .bib-list li { margin-bottom: 4px; }

        @media (max-width: 600px) {
            .lesson-grid { grid-template-columns: 1fr; }
            .navbar { padding: 10px 16px; }
            .navbar-brand { font-size: 15px; }
            .lesson-tab { padding: 10px 4px; font-size: 13px; }
            .hl-legend { flex-direction: column; gap: 8px; }
            .verse { font-size: 15px; }
            .intro-section-body { font-size: 14px; }
            .progress-dual { flex-direction: column; gap: 16px; }
            .match-row { flex-direction: column; align-items: stretch; gap: 6px; }
            .match-left { min-width: auto; }
            .match-arrow { display: none; }
        }


/* ═══════════════════════════════════════
   HISTORY TIMELINE
   ═══════════════════════════════════════ */
.history-page { padding: 0 0 40px; }
.history-page h1 { color:#3e2723; font-size:24px; margin-bottom:4px; }
.history-page .subtitle { color:#888; font-size:14px; margin-bottom:24px; }

/* ── Prophet Activity Chart ── */
.prophet-chart { background:#fff; border-radius:12px; padding:20px; margin-bottom:24px; box-shadow:0 2px 8px rgba(0,0,0,.08); }
.prophet-chart h3 { margin:0 0 16px; font-size:16px; color:#333; }
.prophet-year-axis { display:flex; justify-content:space-between; font-size:11px; color:#999; padding:0 60px 4px 90px; }
.prophet-bar-row { display:flex; align-items:center; margin-bottom:6px; }
.prophet-bar-name { width:85px; text-align:right; padding-right:10px; font-size:13px; font-weight:600; color:#555; flex-shrink:0; }
.prophet-bar-track { flex:1; height:26px; background:#f5f5f5; border-radius:13px; position:relative; overflow:hidden; }
.prophet-bar { position:absolute; top:2px; height:22px; border-radius:11px; background:#80cbc4; display:flex; align-items:center; justify-content:center; font-size:10px; color:#fff; font-weight:600; white-space:nowrap; min-width:20px; transition:opacity .3s; }
.prophet-bar.hl { background:linear-gradient(135deg,#ff8a65,#e64a19); box-shadow:0 2px 6px rgba(230,74,25,.35); }

/* ── Legend ── */
.timeline-legend { display:flex; flex-wrap:wrap; gap:12px; margin-bottom:20px; }
.legend-item { display:flex; align-items:center; gap:5px; font-size:13px; color:#555; }
.legend-dot { width:12px; height:12px; border-radius:50%; flex-shrink:0; }

/* ── Vertical Timeline ── */
.timeline-container { position:relative; padding:10px 0 10px 44px; }
.timeline-container::before { content:''; position:absolute; left:22px; top:0; bottom:0; width:3px; background:linear-gradient(to bottom,#e0e0e0,#bdbdbd,#e0e0e0); border-radius:2px; }
.timeline-event { position:relative; margin-bottom:20px; }
.timeline-dot { position:absolute; left:-30px; top:18px; width:16px; height:16px; border-radius:50%; border:3px solid #fff; box-shadow:0 0 0 2px #ccc; z-index:1; transition:transform .2s; }
.timeline-event.active .timeline-dot { transform:scale(1.3); }
.timeline-date { font-size:13px; font-weight:700; color:#888; margin-bottom:4px; }
.timeline-card { background:#fff; border-radius:12px; padding:16px 18px; box-shadow:0 2px 8px rgba(0,0,0,.07); cursor:pointer; border-left:4px solid #e0e0e0; transition:border-color .3s, box-shadow .3s; }
.timeline-card:hover { box-shadow:0 4px 16px rgba(0,0,0,.12); }
.timeline-event.active .timeline-card { border-left-width:4px; box-shadow:0 4px 16px rgba(0,0,0,.13); }
.timeline-card-header { display:flex; align-items:flex-start; gap:10px; flex-wrap:wrap; }
.timeline-card-header h4 { margin:0; font-size:16px; color:#222; }
.timeline-title-en { font-size:12px; color:#aaa; display:block; margin-top:2px; }
.category-badge { font-size:11px; padding:2px 10px; border-radius:12px; font-weight:600; white-space:nowrap; flex-shrink:0; }
.timeline-desc { font-size:14px; color:#444; margin:10px 0 0; line-height:1.65; }
.timeline-detail { max-height:0; overflow:hidden; transition:max-height .4s ease, opacity .3s; opacity:0; }
.timeline-event.active .timeline-detail { max-height:800px; opacity:1; }
.timeline-figures { margin:12px 0 8px; display:flex; flex-wrap:wrap; gap:6px; align-items:center; font-size:13px; }
.figure-tag { background:#f0f0f0; padding:3px 10px; border-radius:12px; font-size:12px; }
.timeline-refs { font-size:13px; color:#666; margin:6px 0; }
.timeline-detail-text { font-size:14px; color:#555; line-height:1.7; margin-top:10px; padding-top:10px; border-top:1px dashed #e0e0e0; }
.timeline-image { margin-top:12px; text-align:center; }
.timeline-image img { max-width:100%; border-radius:8px; }
.timeline-image .img-caption { display:block; font-size:12px; color:#999; margin-top:4px; }
.expand-hint { font-size:11px; color:#bbb; margin-top:8px; display:block; transition:opacity .3s; }
.timeline-event.active .expand-hint { opacity:0; }

/* ═══════════════════════════════════════
   READING PAGE
   ═══════════════════════════════════════ */
.reading-page { padding:0 0 40px; }
.reading-page h1 { color:#1b5e20; font-size:24px; margin-bottom:4px; }
.reading-page .subtitle { color:#888; font-size:14px; margin-bottom:28px; }

/* ── 展開/收合全部按鈕 ── */
.reading-controls { display:flex; gap:10px; margin-bottom:20px; flex-wrap:wrap; }
.btn-expand-all { background:#fff; border:1px solid #ccc; color:#555; padding:8px 18px; border-radius:20px; cursor:pointer; font-size:13px; font-weight:600; transition:all .2s; }
.btn-expand-all:hover { background:#f5f5f5; border-color:#999; }

/* ── Article Card ── */
.reading-article { background:#fff; border-radius:12px; padding:24px; margin-bottom:24px; box-shadow:0 2px 8px rgba(0,0,0,.07); }
.reading-article .article-cat { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.5px; color:#00897b; margin-bottom:4px; }
.reading-article .article-lesson { font-size:12px; color:#999; margin-bottom:8px; }
.reading-article h3 { margin:0 0 16px; font-size:18px; color:#222; }
.reading-article blockquote { margin:12px 0; padding:12px 20px; background:#f5f5f5; border-left:4px solid #00897b; border-radius:0 8px 8px 0; font-style:italic; color:#444; }
.reading-article p { font-size:14px; line-height:1.75; color:#333; }

/* ── Article Accordion (標題列 + 收合/展開) ── */
.article-header-bar { cursor:pointer; display:flex; justify-content:space-between; align-items:flex-start; padding:0 0 8px; user-select:none; }
.article-header-bar:hover { opacity:.85; }
.article-header-bar .arrow { font-size:18px; transition:transform .3s; color:#666; flex-shrink:0; margin-top:4px; }
.article-header-bar .arrow.open { transform:rotate(180deg); }
.article-body-wrap { max-height:0; overflow:hidden; opacity:0; transition:max-height .4s ease, opacity .3s ease; }
.article-body-wrap.open { max-height:5000px; opacity:1; }
.article-status-hint { font-size:13px; margin-left:8px; font-weight:normal; }

/* ── Footnote marks ── */
.fn-mark { color:#d32f2f; cursor:pointer; font-weight:700; padding:0 1px; transition:color .2s; }
.fn-mark:hover { color:#b71c1c; text-decoration:underline; }

/* ── Footnote Popup ── */
.fn-popup { display:none; background:#fff8e1; border:1px solid #ffe082; border-radius:8px; padding:14px 16px; margin:12px 0; font-size:13px; line-height:1.6; color:#555; position:relative; }
.fn-popup.show { display:block; animation:fadeSlide .3s ease; }
.fn-popup .fn-close { position:absolute; top:6px; right:10px; cursor:pointer; font-size:16px; color:#999; }
.fn-popup .fn-num { font-weight:700; color:#d32f2f; margin-right:4px; }

/* ── Book Card ── */
.book-card { display:flex; gap:20px; background:#fafafa; border:1px solid #e8e8e8; border-radius:12px; padding:20px; margin-top:16px; }
.book-card img { width:110px; height:auto; border-radius:6px; box-shadow:0 2px 8px rgba(0,0,0,.12); object-fit:contain; flex-shrink:0; }
.book-card-info { flex:1; }
.book-card-info .book-title { font-size:15px; font-weight:700; color:#222; margin-bottom:4px; }
.book-card-info .book-author { font-size:13px; color:#666; margin-bottom:2px; }
.book-card-info .book-pub { font-size:12px; color:#999; margin-bottom:10px; }
.book-card-info .book-buy { display:inline-block; background:#00897b; color:#fff; padding:8px 18px; border-radius:20px; text-decoration:none; font-size:13px; font-weight:600; transition:background .2s; }
.book-card-info .book-buy:hover { background:#00695c; }
.fn-back { display:inline-block; margin-top:10px; font-size:12px; color:#00897b; cursor:pointer; }
.fn-back:hover { text-decoration:underline; }
@keyframes fadeSlide { from { opacity:0; transform:translateY(-6px); } to { opacity:1; transform:translateY(0); } }

/* ── Bibliography Section ── */
.bib-section { margin-top:36px; padding-top:24px; border-top:2px solid #e0e0e0; }
.bib-section h3 { color:#333; margin-bottom:16px; font-size:17px; }

/* ── Responsive ── */
@media(max-width:600px){
    .book-card { flex-direction:column; align-items:center; text-align:center; }
    .book-card img { width:140px; }
    .prophet-bar-name { width:60px; font-size:11px; }
    .timeline-container { padding-left:32px; }
    .timeline-dot { left:-24px; width:12px; height:12px; }
    .reading-controls { justify-content:center; }
}

    }
}

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged, updateProfile, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyCq-53c29i4TDDJUjL35R6QBSXvwlHkHUI",
    authDomain: "daniel-bible-study.firebaseapp.com",
    projectId: "daniel-bible-study",
    storageBucket: "daniel-bible-study.firebasestorage.app",
    messagingSenderId: "455825520749",
    appId: "1:455825520749:web:c1328bcc7ea4b39ff62764"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const LESSONS = window.LESSONS_DATA;

let currentUser = null;
let userData = {};
let currentLessonId = null;
let hlVerse = null;
let activeLessonTabIds = [];

// ==========================================
// AUTH
// ==========================================
function showMsg(id, text, type) {
    const el = document.getElementById(id);
    el.className = 'auth-msg ' + type;
    el.textContent = text;
    el.style.display = 'block';
}

window.switchAuthTab = function(tab) {
    document.querySelectorAll('.auth-tab').forEach((t, i) => {
        t.classList.toggle('active', (tab === 'login' ? i === 0 : i === 1));
    });
    document.getElementById('login-form').style.display = tab === 'login' ? 'block' : 'none';
    document.getElementById('register-form').style.display = tab === 'register' ? 'block' : 'none';
};

window.doLogin = async function() {
    const email = document.getElementById('login-email').value.trim();
    const pw = document.getElementById('login-password').value;
    if (!email || !pw) return showMsg('login-msg', '請填寫電郵和密碼', 'error');
    try { await signInWithEmailAndPassword(auth, email, pw); }
    catch (e) { showMsg('login-msg', '登入失敗：' + e.message, 'error'); }
};

window.doRegister = async function() {
    const name = document.getElementById('reg-name').value.trim();
    const email = document.getElementById('reg-email').value.trim();
    const pw = document.getElementById('reg-password').value;
    if (!name || !email || !pw) return showMsg('register-msg', '請填寫所有欄位', 'error');
    if (pw.length < 6) return showMsg('register-msg', '密碼需至少6位', 'error');
    try {
        const cred = await createUserWithEmailAndPassword(auth, email, pw);
        await updateProfile(cred.user, { displayName: name });
        await setDoc(doc(db, 'users', cred.user.uid), { displayName: name, email: email, progress: {}, highlights: {}, notes: {} });
    } catch (e) { showMsg('register-msg', '註冊失敗：' + e.message, 'error'); }
};

window.doForgotPassword = async function() {
    const email = document.getElementById('login-email').value.trim();
    if (!email) return showMsg('login-msg', '請先填寫電郵地址，再點「忘記密碼」', 'error');
    try {
        await sendPasswordResetEmail(auth, email);
        showMsg('login-msg', '重置密碼的電郵已發送到 ' + email + '，請檢查收件箱（及垃圾郵件）。', 'success');
    } catch (e) { showMsg('login-msg', '發送失敗：' + e.message, 'error'); }
};

window.doLogout = async function() { await signOut(auth); };

onAuthStateChanged(auth, async (user) => {
    if (user) {
        currentUser = user;
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        document.getElementById('user-name').textContent = '👤 ' + (user.displayName || user.email);
        await loadUserData();
        renderDashboard();
    } else {
        currentUser = null;
        document.getElementById('auth-screen').style.display = 'flex';
        document.getElementById('app').style.display = 'none';
    }
});

// ==========================================
// FIRESTORE
// ==========================================
async function loadUserData() {
    try {
        const snap = await getDoc(doc(db, 'users', currentUser.uid));
        if (snap.exists()) { userData = snap.data(); }
        else {
            userData = { displayName: currentUser.displayName, email: currentUser.email, progress: {}, highlights: {}, notes: {} };
            await setDoc(doc(db, 'users', currentUser.uid), userData);
        }
        if (!userData.progress) userData.progress = {};
        if (!userData.highlights) userData.highlights = {};
        if (!userData.notes) userData.notes = {};
    } catch (e) { console.error('Load error:', e); }
}

async function saveUserData() {
    if (!currentUser) return;
    try { await setDoc(doc(db, 'users', currentUser.uid), userData, { merge: true }); }
    catch (e) { console.error('Save error:', e); }
}

// ==========================================
// DASHBOARD
// ==========================================
function renderDashboard() {
    const activeLessons = LESSONS.filter(l => !l.comingSoon && !l.isHistory && !l.isReading);
    const quizzableLessons = activeLessons.filter(l => l.quiz && l.quiz.length > 0);
    const totalRead = activeLessons.length;
    const totalQuiz = quizzableLessons.length;

    let doneRead = 0, doneQuiz = 0, totalScore = 0;
    activeLessons.forEach(l => {
        const p = userData.progress[l.id];
        if (p && p.scriptureRead) doneRead++;
    });
    quizzableLessons.forEach(l => {
        const p = userData.progress[l.id];
        if (p && p.quizScore != null) { doneQuiz++; totalScore += p.quizScore; }
    });

    const pctRead = totalRead > 0 ? Math.round(doneRead / totalRead * 100) : 0;
    const pctQuiz = totalQuiz > 0 ? Math.round(doneQuiz / totalQuiz * 100) : 0;
    const avgScore = doneQuiz > 0 ? Math.round(totalScore / doneQuiz) : 0;

    document.getElementById('prog-bar-read').style.width = pctRead + '%';
    document.getElementById('prog-bar-read').textContent = pctRead + '%';
    document.getElementById('prog-stats-read').textContent = '已讀 ' + doneRead + ' / ' + totalRead + ' 課';

    document.getElementById('prog-bar-quiz').style.width = pctQuiz + '%';
    document.getElementById('prog-bar-quiz').textContent = pctQuiz + '%';
    if (totalQuiz > 0) {
        let quizStats = '已完成 ' + doneQuiz + ' / ' + totalQuiz + ' 課';
        if (doneQuiz > 0) quizStats += '　|　平均分數 ' + avgScore + '%';
        document.getElementById('prog-stats-quiz').textContent = quizStats;
    } else {
        document.getElementById('prog-stats-quiz').textContent = '暫無測驗';
    }

    // ── 課餘閱讀進度 ──
    const readingLessons = LESSONS.filter(l => !l.comingSoon && l.isReading);
    const readingRow = document.getElementById('reading-progress-row');

    if (readingLessons.length > 0) {
        let totalRL = 0, doneRL = 0;
        readingLessons.forEach(l => {
            const artCount = (l.articles && l.articles.length) ? l.articles.length : 0;
            totalRL += artCount;
            const p = userData.progress[l.id];
            if (p && p.articlesRead && l.articles) {
                l.articles.forEach(art => { if (p.articlesRead[art.id]) doneRL++; });
            }
        });
        if (totalRL > 0) {
            const pctRL = Math.round(doneRL / totalRL * 100);
            readingRow.style.display = 'flex';
            document.getElementById('prog-bar-reading').style.width = pctRL + '%';
            document.getElementById('prog-bar-reading').textContent = pctRL + '%';
            document.getElementById('prog-stats-reading').textContent = '已閱讀 ' + doneRL + ' / ' + totalRL + ' 篇';
            const badge = document.getElementById('reading-badge');
            if (doneRL === 0) { badge.textContent = '📖 開始你的課餘閱讀之旅吧！'; badge.style.color = '#888'; }
            else if (doneRL < totalRL) { badge.textContent = '⭐ 好學不倦！繼續加油！'; badge.style.color = '#ff8f00'; }
            else { badge.textContent = '🏆 全部完成！你是閱讀達人！'; badge.style.color = '#e65100'; }
        } else { readingRow.style.display = 'none'; }
    } else { readingRow.style.display = 'none'; }

    // ── Lesson cards ──
    const grid = document.getElementById('lesson-grid');
    grid.innerHTML = '';
    LESSONS.forEach(l => {
        const p = userData.progress[l.id] || {};
        const hasQuiz = l.quiz && l.quiz.length > 0;
        const isRead = !!p.scriptureRead;
        const quizDone = p.quizScore != null;
        const isCompleted = isRead && (!hasQuiz || quizDone);

        const card = document.createElement('div');
        let cardClass = 'lesson-card';
        if (isCompleted && !l.comingSoon) cardClass += ' completed';
        if (l.comingSoon) cardClass += ' coming-soon';
        if (l.isSelfStudy) cardClass += ' self-study';
        card.className = cardClass;

        let statusHtml = '<div class="lesson-status">';
        if (l.comingSoon) {
            statusHtml += '<span class="badge badge-locked">🔒 即將推出</span>';
        } else {
            statusHtml += isRead
                ? '<span class="badge badge-read">✅ 已讀</span>'
                : '<span class="badge badge-unread">📖 未讀</span>';
            if (hasQuiz) {
                statusHtml += quizDone
                    ? '<span class="badge badge-score">📝 測驗 ' + p.quizScore + '%</span>'
                    : '<span class="badge badge-noquiz">📝 未測驗</span>';
            }
        }
        statusHtml += '</div>';

        let dateHtml = l.date ? '<div class="lesson-date">📅 ' + l.date + '</div>' : '';

        card.innerHTML = '<h3>' + l.title + '：' + l.subtitle + '</h3>'
            + dateHtml
            + '<div class="ref">' + l.ref + '</div>'
            + '<div class="desc">' + l.description + '</div>'
            + statusHtml;

        if (!l.comingSoon) card.onclick = () => openLesson(l.id);
        grid.appendChild(card);
    });
}

// ==========================================
// BUILD DYNAMIC TABS
// ==========================================
function buildLessonTabs(lesson) {
    const tabsBar = document.getElementById('lv-tabs');
    const panelsContainer = document.getElementById('lv-tab-panels');
    panelsContainer.innerHTML = '';
    activeLessonTabIds = [];

    let tabs = [];
    const hasChapters = lesson.chapters && lesson.chapters.length > 0;

    if (lesson.isIntro) {
        tabs.push({ id: 'scripture', label: '📖 課程內容' });
    } else if (hasChapters) {
        lesson.chapters.forEach(ch => {
            tabs.push({
                id: 'scripture-ch' + ch.chapter,
                label: ch.tabLabel || ('📖 第' + ch.chapter + '章')
            });
        });
    } else {
        tabs.push({ id: 'scripture', label: '📖 經文' });
    }

    tabs.push({ id: 'questions', label: '✏️ 討論問題' });
    tabs.push({ id: 'quiz', label: '📝 測驗' });

    tabsBar.innerHTML = tabs.map((t, i) =>
        '<div class="lesson-tab' + (i === 0 ? ' active' : '') + '" data-tab="' + t.id + '">' + t.label + '</div>'
    ).join('');

    tabs.forEach((t, i) => {
        const div = document.createElement('div');
        div.id = 'tab-' + t.id;
        div.className = 'tab-content' + (i === 0 ? ' active' : '');
        panelsContainer.appendChild(div);
    });

    activeLessonTabIds = tabs.map(t => t.id);
}

// ==========================================
// LESSON VIEW
// ==========================================
function openLesson(id) {
    document.getElementById('navbar-brand').style.display = 'none';
    document.getElementById('btn-back-nav').style.display = 'inline-block';
    currentLessonId = id;
    const lesson = LESSONS.find(l => l.id === id);
    if (!lesson || lesson.comingSoon) return;

    // ── 歷史 / 閱讀 → 專屬容器 ──
    if (lesson.isHistory || lesson.isReading) {
        document.getElementById('dashboard-view').style.display = 'none';
        document.getElementById('lesson-view').style.display = 'none';
        document.getElementById('lesson-detail-wrapper').style.display = 'block';
        if (lesson.isHistory) renderHistory(lesson);
        else renderReading(lesson);
        return;
    }

    // ── 一般課程 ──
    document.getElementById('dashboard-view').style.display = 'none';
    document.getElementById('lesson-detail-wrapper').style.display = 'none';
    document.getElementById('lesson-view').style.display = 'block';
    document.getElementById('lv-header').innerHTML =
        '<h1>' + lesson.title + '：' + lesson.subtitle + '</h1>'
        + '<p>' + lesson.ref + ' — ' + lesson.description + '</p>';

    buildLessonTabs(lesson);

    const hasChapters = lesson.chapters && lesson.chapters.length > 0;
    if (lesson.isIntro) {
        renderIntroContent(lesson);
    } else if (hasChapters) {
        lesson.chapters.forEach((ch, idx) => {
            renderScriptureChapter(lesson, ch, idx);
        });
    } else {
        renderScripture(lesson);
    }

    renderQuestions(lesson);
    renderQuiz(lesson);

    if (activeLessonTabIds.length > 0) {
        showLessonTab(activeLessonTabIds[0]);
    }
}

window.goBack = function() {
    document.getElementById('navbar-brand').style.display = '';
    document.getElementById('btn-back-nav').style.display = 'none';
    document.getElementById('lesson-view').style.display = 'none';
    document.getElementById('lesson-detail-wrapper').style.display = 'none';
    document.getElementById('dashboard-view').style.display = 'block';
    currentLessonId = null;
    renderDashboard();
};

document.getElementById('lv-tabs').addEventListener('click', (e) => {
    const tab = e.target.dataset?.tab;
    if (tab) showLessonTab(tab);
});

function showLessonTab(tabId) {
    document.querySelectorAll('#lv-tabs .lesson-tab').forEach(t =>
        t.classList.toggle('active', t.dataset.tab === tabId)
    );
    activeLessonTabIds.forEach(id => {
        const el = document.getElementById('tab-' + id);
        if (el) el.classList.toggle('active', id === tabId);
    });
    document.getElementById('hl-popup').style.display = 'none';
}

// ==========================================
// INTRO CONTENT TAB
// ==========================================
function renderIntroContent(lesson) {
    const container = document.getElementById('tab-scripture');
    if (!container) return;
    const isRead = userData.progress[lesson.id]?.scriptureRead;

// QUIZ TAB
// ==========================================
let quizAnswers = {};
let quizSubmitted = false;
let matchShuffleCache = {};

function renderQuiz(lesson) {
    quizAnswers = {};
    quizSubmitted = false;
    matchShuffleCache = {};
    const container = document.getElementById('tab-quiz');
    if (!container) return;

    if (!lesson.quiz || lesson.quiz.length === 0) {
        container.innerHTML = '<div class="coming-soon"><div class="icon">📝</div><h3>測驗準備中</h3><p>請稍候，測驗即將更新。</p></div>';
        return;
    }
    const prevScore = userData.progress[lesson.id]?.quizScore;
    let html = '<div class="quiz-box"><h2>📝 課後測驗</h2>';
    if (prevScore != null) html += '<p style="color:#43a047;margin:8px 0">上次成績：' + prevScore + '%</p>';
    html += '<p style="color:#888;font-size:13px;margin-bottom:16px">請回答以下問題（包含選擇、填充及配對題）：</p>';

    lesson.quiz.forEach((q, qi) => {
        const qType = q.type || 'mc';
        html += '<div class="quiz-q" id="qq-' + qi + '"><h4>' + (qi + 1) + '. ' + q.q + '</h4>';

        if (qType === 'mc') {
            q.opts.forEach((opt, oi) => {
                html += '<label class="quiz-opt" data-qi="' + qi + '" data-oi="' + oi + '" onclick="pickQuiz(' + qi + ',' + oi + ')">' + String.fromCharCode(65 + oi) + '. ' + opt + '</label>';
            });
        } else if (qType === 'fill') {
            html += '<input type="text" class="fill-input" data-qi="' + qi + '" placeholder="請填寫答案…">';
        } else if (qType === 'match') {
            const shuffled = q.pairs.map((p, i) => ({ text: p.right, idx: i }));
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            matchShuffleCache[qi] = shuffled;
            html += '<div class="match-grid">';
            q.pairs.forEach((pair, mi) => {
                html += '<div class="match-row">'
                    + '<span class="match-left">' + pair.left + '</span>'
                    + '<span class="match-arrow">→</span>'
                    + '<select class="match-select" data-qi="' + qi + '" data-mi="' + mi + '">'
                    + '<option value="">請選擇…</option>'
                    + shuffled.map(s => '<option value="' + s.idx + '">' + s.text + '</option>').join('')
                    + '</select></div>';
            });
            html += '</div>';
        }
        html += '</div>';
    });

    html += '<button class="btn-quiz" id="btn-submit-quiz" onclick="submitQuiz()">提交答案</button>';
    html += '<div class="quiz-result" id="quiz-result"></div></div>';
    container.innerHTML = html;
}

window.pickQuiz = function(qi, oi) {
    if (quizSubmitted) return;
    quizAnswers[qi] = oi;
    document.querySelectorAll('[data-qi="' + qi + '"].quiz-opt').forEach(el => {
        el.classList.toggle('selected', parseInt(el.dataset.oi) === oi);
    });
};

window.submitQuiz = async function() {
    if (quizSubmitted) return;
    const lesson = LESSONS.find(l => l.id === currentLessonId);
    if (!lesson) return;
    const total = lesson.quiz.length;

    let allAnswered = true;
    lesson.quiz.forEach((q, qi) => {
        const qType = q.type || 'mc';
        if (qType === 'mc') {
            if (quizAnswers[qi] === undefined) allAnswered = false;
        } else if (qType === 'fill') {
            const input = document.querySelector('.fill-input[data-qi="' + qi + '"]');
            if (!input || !input.value.trim()) allAnswered = false;
        } else if (qType === 'match') {
            q.pairs.forEach((_, mi) => {
                const sel = document.querySelector('select[data-qi="' + qi + '"][data-mi="' + mi + '"]');
                if (!sel || !sel.value) allAnswered = false;
            });
        }
    });

    if (!allAnswered) {
        const result = document.getElementById('quiz-result');
        result.style.display = 'block';
        result.className = 'quiz-result fail';
        result.textContent = '⚠️ 請回答所有問題！';
        setTimeout(() => { result.style.display = 'none'; }, 2000);
        return;
    }

    quizSubmitted = true;
    let correct = 0;

    lesson.quiz.forEach((q, qi) => {
        const qType = q.type || 'mc';
        if (qType === 'mc') {
            const picked = quizAnswers[qi];
            const isCorrect = picked === q.ans;
            if (isCorrect) correct++;
            document.querySelectorAll('[data-qi="' + qi + '"].quiz-opt').forEach(el => {
                const oi = parseInt(el.dataset.oi);
                if (oi === q.ans) el.classList.add('correct');
                else if (oi === picked && !isCorrect) el.classList.add('wrong');
            });
        } else if (qType === 'fill') {
            const input = document.querySelector('.fill-input[data-qi="' + qi + '"]');
            const userAns = input.value.trim();
            const accepts = q.accept || [q.ans];
            const isCorrect = accepts.some(a => a.trim().toLowerCase() === userAns.toLowerCase());
            if (isCorrect) correct++;
            input.classList.add(isCorrect ? 'correct' : 'wrong');
            input.readOnly = true;
            if (!isCorrect) {
                const hint = document.createElement('div');
                hint.className = 'fill-correct-ans';
                hint.textContent = '✅ 正確答案：' + q.ans;
                input.parentElement.appendChild(hint);
            }
        } else if (qType === 'match') {
            let allCorrect = true;
            q.pairs.forEach((pair, mi) => {
                const sel = document.querySelector('select[data-qi="' + qi + '"][data-mi="' + mi + '"]');
                const isCorrect = parseInt(sel.value) === mi;
                if (!isCorrect) allCorrect = false;
                sel.classList.add(isCorrect ? 'correct' : 'wrong');
                sel.disabled = true;
            });
            if (allCorrect) correct++;
            if (!allCorrect) {
                const grid = document.querySelector('#qq-' + qi + ' .match-grid');
                const hint = document.createElement('div');
                hint.className = 'fill-correct-ans';
                hint.style.marginTop = '8px';
                hint.innerHTML = '✅ 正確配對：' + q.pairs.map(p => p.left + ' → ' + p.right).join('；');
                grid.parentElement.appendChild(hint);
            }
        }
    });

    const score = Math.round(correct / total * 100);
    const result = document.getElementById('quiz-result');
    result.style.display = 'block';
    result.className = 'quiz-result ' + (score >= 60 ? 'pass' : 'fail');
    result.textContent = '你的分數：' + score + '%（' + correct + '/' + total + '）' + (score >= 60 ? ' 🎉' : ' — 請再加油！');
    document.getElementById('btn-submit-quiz').disabled = true;

    if (!userData.progress[currentLessonId]) userData.progress[currentLessonId] = {};
    userData.progress[currentLessonId].quizScore = score;
    if (userData.progress[currentLessonId].scriptureRead) {
        userData.progress[currentLessonId].completed = true;
        userData.progress[currentLessonId].completedAt = new Date().toISOString();
    }
    await saveUserData();
};

            + '<span class="category-badge" style="background:' + cat.bg + ';color:' + cat.color + '">' + cat.icon + ' ' + cat.label + '</span>'
            + '<div><h4>' + ev.title + '</h4>'
            + (ev.titleEn ? '<span class="timeline-title-en">' + ev.titleEn + '</span>' : '')
            + '</div></div>'
            + '<p class="timeline-desc">' + ev.description + '</p>'
            + '<div class="timeline-detail">';

        if (ev.keyFigures && ev.keyFigures.length) {
            h += '<div class="timeline-figures"><strong>👤 重要人物：</strong>';
            ev.keyFigures.forEach(function(f) { h += '<span class="figure-tag">' + f + '</span>'; });
            h += '</div>';
        }
        if (ev.references && ev.references.length) {
            h += '<div class="timeline-refs"><strong>📖 經文參考：</strong>' + ev.references.join('、') + '</div>';
        }
        if (ev.detail) {
            h += '<div class="timeline-detail-text">' + ev.detail + '</div>';
        }
        if (ev.image) {
            h += '<div class="timeline-image"><img src="' + ev.image.src + '" alt="' + (ev.image.caption || '') + '">'
                + (ev.image.caption ? '<span class="img-caption">' + ev.image.caption + '</span>' : '')
                + '</div>';
        }

        h += '</div>'
            + '<span class="expand-hint">▾ 點擊展開詳情</span>'
            + '</div></div>';
    });
    h += '</div>';
    h += '</div>';
    c.innerHTML = h;
}

window.toggleTLEvent = function(i) {
    var el = document.getElementById('tev-' + i);
    if (el) el.classList.toggle('active');
};

// ==========================================
// READING — 課餘閱讀渲染 (★ 已更新：預設收合 + 展開/收合全部按鈕)
// ==========================================
function renderReading(lesson) {
    var c = document.getElementById('lesson-detail');
    var bib = lesson.bibliography;
    var h = '<div class="reading-page">';
    h += '<h1>📚 ' + lesson.title + '</h1>';
    h += '<p class="subtitle">' + lesson.description + '</p>';

    /* ★ 新增：展開/收合全部按鈕 */
    h += '<div class="reading-controls">';
    h += '<button class="btn-expand-all" onclick="toggleAllArticles(true)">📖 展開全部</button>';
    h += '<button class="btn-expand-all" onclick="toggleAllArticles(false)">📕 收合全部</button>';
    h += '</div>';

    lesson.articles.forEach(function(art, ai) {
        var artRead = userData.progress[lesson.id]
            && userData.progress[lesson.id].articlesRead
            && userData.progress[lesson.id].articlesRead[art.id];

        h += '<div class="reading-article" id="art-' + art.id + '">';

        h += '<div class="article-header-bar" onclick="toggleArticle(\'' + art.id + '\')">';
        h += '<div>'
            + '<div class="article-cat">' + art.categoryLabel + '</div>'
            + '<div class="article-lesson">📖 ' + art.lessonRef + '</div>'
            + '<h3 style="margin:0">' + art.icon + ' ' + art.title
            + (artRead ? '<span class="article-status-hint" style="color:#43a047"> ✅ 已讀</span>' : '<span class="article-status-hint" style="color:#999"> 📖 未讀</span>')
            + '</h3>'
            + '</div>';
        h += '<span class="arrow" id="art-arrow-' + art.id + '">▼</span>';
        h += '</div>';

        /* ★ 預設不加 open，文章收合 */
        h += '<div class="article-body-wrap" id="art-body-' + art.id + '">';
        h += '<div class="article-body">' + art.html + '</div>';

        if (art.footnotes && art.footnotes.length) {
            art.footnotes.forEach(function(fn) {
                var book = bib[fn.bookKey];
                h += '<div class="fn-popup" id="fnp-' + art.id + '-' + fn.num + '">'
                    + '<span class="fn-close" onclick="closeFn(\'' + art.id + '\',' + fn.num + ')">✕</span>'
                    + '<span class="fn-num">[' + fn.num + ']</span> ' + fn.text;

                if (book) {
                    h += '<div class="book-card">';
                    if (book.image) h += '<img src="' + book.image + '" alt="' + book.title + '">';
                    h += '<div class="book-card-info">'
                        + '<div class="book-title">' + book.title + '</div>'
                        + '<div class="book-author">' + book.author + '</div>'
                        + '<div class="book-pub">' + book.publisher + ', ' + book.year
                        + (book.series ? ' — ' + book.series : '') + '</div>';
                    if (book.link) h += '<a class="book-buy" href="' + book.link + '" target="_blank" rel="noopener">📖 在 Logos 購買</a>';
                    h += '</div></div>';
                }

                h += '<span class="fn-back" onclick="closeFn(\'' + art.id + '\',' + fn.num + ')">↑ 返回引文</span>'
                    + '</div>';
            });
        }

        h += '<div style="text-align:center;margin:24px 0 16px">';
        h += '<button class="btn-mark-read' + (artRead ? ' done' : '') + '" '
            + 'onclick="markArticleRead(\'' + lesson.id + '\',\'' + art.id + '\')" '
            + 'id="btn-read-' + art.id + '">';
        h += (artRead ? '✅ 已完成閱讀此篇' : '📚 標記已完成閱讀此篇');
        h += '</button></div>';

        h += '</div>'; /* end article-body-wrap */
        h += '</div>'; /* end reading-article */
    });

    h += '<div class="bib-section"><h3>📕 參考書目</h3>';
    for (var key in bib) {
        var b = bib[key];
        h += '<div class="book-card" id="bib-' + key + '">';
        if (b.image) h += '<img src="' + b.image + '" alt="' + b.title + '">';
        h += '<div class="book-card-info">'
            + '<div class="book-title">' + b.title + '</div>'
            + '<div class="book-author">' + b.author + '</div>'
            + '<div class="book-pub">' + b.publisher + ', ' + b.address + ', ' + b.year
            + (b.series ? '<br>Series: ' + b.series : '')
            + (b.isbn ? '<br>ISBN: ' + b.isbn : '')
            + '</div>';
        if (b.link) h += '<a class="book-buy" href="' + b.link + '" target="_blank" rel="noopener">📖 在 Logos 購買</a>';
        h += '</div></div>';
    }
    h += '</div>';

    h += '</div>';
    c.innerHTML = h;

    c.querySelectorAll('.fn-mark').forEach(function(el) {
        el.addEventListener('click', function(e) {
            e.stopPropagation();
            var fnNum = el.getAttribute('data-fn');
            var artEl = el.closest('.reading-article');
            var artId = artEl ? artEl.id.replace('art-', '') : '';
            var popup = document.getElementById('fnp-' + artId + '-' + fnNum);
            if (popup) {
                c.querySelectorAll('.fn-popup.show').forEach(function(p) { p.classList.remove('show'); });
                popup.classList.add('show');
                popup.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }
        });
    });
}

window.closeFn = function(artId, fnNum) {
    var popup = document.getElementById('fnp-' + artId + '-' + fnNum);
    if (popup) popup.classList.remove('show');
    var mark = document.querySelector('#art-' + artId + ' .fn-mark[data-fn="' + fnNum + '"]');
    if (mark) mark.scrollIntoView({ behavior: 'smooth', block: 'center' });
};

window.markArticleRead = function(lessonId, articleId) {
    if (!userData.progress[lessonId]) userData.progress[lessonId] = {};
    if (!userData.progress[lessonId].articlesRead) userData.progress[lessonId].articlesRead = {};

    userData.progress[lessonId].articlesRead[articleId] = true;

    var lesson = LESSONS.find(function(l) { return l.id === lessonId; });
    if (lesson && lesson.articles) {
        var allDone = lesson.articles.every(function(art) {
            return userData.progress[lessonId].articlesRead
                && userData.progress[lessonId].articlesRead[art.id];
        });
        userData.progress[lessonId].scriptureRead = allDone;
    }

    saveUserData();

    var btn = document.getElementById('btn-read-' + articleId);
    if (btn) { btn.classList.add('done'); btn.textContent = '✅ 已完成閱讀此篇'; }

    var artEl = document.getElementById('art-' + articleId);
    if (artEl) {
        var hint = artEl.querySelector('.article-status-hint');
        if (hint) { hint.textContent = ' ✅ 已讀'; hint.style.color = '#43a047'; }
    }

    if (userData.progress[lessonId].scriptureRead) showReadingComplete();
};

function showReadingComplete() {
    var existing = document.getElementById('reading-complete-msg');
    if (existing) return;
    var msg = document.createElement('div');
    msg.id = 'reading-complete-msg';
    msg.style.cssText = 'text-align:center;padding:16px;margin:16px auto;max-width:400px;'
        + 'background:#e8f5e9;border-radius:12px;color:#2e7d32;font-weight:bold;font-size:16px;';
    msg.textContent = '🏆 太棒了！你已完成所有課餘閱讀！';
    var container = document.getElementById('lesson-detail');
    if (container) container.appendChild(msg);
}

window.toggleArticle = function(artId) {
    var body = document.getElementById('art-body-' + artId);
    var arrow = document.getElementById('art-arrow-' + artId);
    if (body && arrow) { body.classList.toggle('open'); arrow.classList.toggle('open'); }
};

/* ★ 新增：展開/收合全部文章 */
window.toggleAllArticles = function(expand) {
    document.querySelectorAll('.article-body-wrap').forEach(function(el) {
        if (expand) el.classList.add('open');
        else el.classList.remove('open');
    });
    document.querySelectorAll('.article-header-bar .arrow').forEach(function(el) {
        if (expand) el.classList.add('open');
        else el.classList.remove('open');
    });
};

</script>
