// ================================================================
// STORAGE
// ================================================================
function getStore(key, def) {
  try { const d = localStorage.getItem(key); return d ? JSON.parse(d) : def; }
  catch(e) { return def; }
}
function setStore(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch(e) {}
}
function getUsers() { return getStore('dan_users', {}); }
function getHL(user, lid) { return getStore('dan_hl_'+user+'_'+lid, {}); }
function setHL(user, lid, data) { setStore('dan_hl_'+user+'_'+lid, data); }
function getNote(user, lid, qid) { return getStore('dan_n_'+user+'_'+lid+'_'+qid, ''); }
function setNote(user, lid, qid, txt) { setStore('dan_n_'+user+'_'+lid+'_'+qid, txt); }
function getProgress(user) { return getStore('dan_prog_'+user, {}); }
function setProgress(user, lid, done) {
  const p = getProgress(user); p[lid] = done; setStore('dan_prog_'+user, p);
}

// ================================================================
// SIMPLE HASH
// ================================================================
function sHash(s) {
  let h = 0;
  for (let i = 0; i < s.length; i++) { h = ((h << 5) - h) + s.charCodeAt(i); h |= 0; }
  return 'h' + Math.abs(h).toString(36);
}

// ================================================================
// AUTH
// ================================================================
function doLogin(u, p) {
  const users = getUsers();
  if (!users[u]) { S.msg = '用戶名不存在，請先註冊。'; render(); return; }
  if (users[u].pw !== sHash(p)) { S.msg = '密碼不正確。'; render(); return; }
  S.user = { name: u, display: users[u].dn };
  S.view = 'dashboard'; S.msg = '';
  setStore('dan_session', S.user);
  render();
}
function doRegister(u, p, dn) {
  if (!u || !p || !dn) { S.msg = '請填寫所有欄位。'; render(); return; }
  if (u.length < 2) { S.msg = '用戶名至少 2 個字元。'; render(); return; }
  if (p.length < 3) { S.msg = '密碼至少 3 個字元。'; render(); return; }
  const users = getUsers();
  if (users[u]) { S.msg = '此用戶名已被使用。'; render(); return; }
  users[u] = { pw: sHash(p), dn: dn };
  setStore('dan_users', users);
  S.user = { name: u, display: dn };
  S.view = 'dashboard'; S.msg = '';
  setStore('dan_session', S.user);
  render();
}
function doLogout() {
  S.user = null; S.view = 'login'; S.msg = '';
  localStorage.removeItem('dan_session');
  render();
}

// ================================================================
// RENDER ENGINE
// ================================================================
function render() {
  const app = document.getElementById('app');
  if (!S.user) { app.innerHTML = renderLogin(); }
  else if (S.view === 'dashboard') { app.innerHTML = renderNav() + renderDashboard(); }
  else if (S.view === 'lesson') { app.innerHTML = renderNav() + renderLesson(); }
  window.scrollTo(0, 0);
}

  return `
  <nav class="bg-white shadow-sm sticky top-0 z-50">
    <div class="max-w-5xl mx-auto px-4 h-14 flex items-center justify-between">
      <button onclick="S.view='dashboard';S.tab='reading';render()" class="flex items-center gap-2 text-teal-700 font-bold text-sm hover:text-teal-600 transition">
        📖 <span class="hidden sm:inline">但以理書研經課程</span><span class="sm:hidden">但以理書</span>
      </button>
      <div class="flex items-center gap-3">
        <span class="text-sm text-gray-600">${S.user.display}</span>
        <button onclick="doLogout()" class="text-xs text-gray-400 hover:text-red-500 transition">登出</button>
      </div>
    </div>
  </nav>`;
}

// ================================================================
// DASHBOARD
// ================================================================
function renderDashboard() {
  const prog = getProgress(S.user.name);
  const done = Object.values(prog).filter(v => v).length;
  const pct = Math.round((done / 12) * 100);
  let cards = LESSONS.map(l => {
    const isDone = prog[l.id];
    return `
    <div class="bg-white rounded-xl shadow-sm border border-gray-100 card-h ${l.ok ? 'cursor-pointer' : 'opacity-60'}"
      ${l.ok ? `onclick="S.view='lesson';S.lessonId=${l.id};S.tab='reading';S.marker=null;render()"` : ''}>
      <div class="p-5">
        <div class="flex items-center justify-between mb-3">
          <span class="inline-flex items-center justify-center w-9 h-9 rounded-full text-sm font-bold
            ${isDone ? 'bg-green-100 text-green-700' : 'bg-teal-50 text-teal-700'}">
            ${isDone ? '✓' : l.id}
          </span>
          ${!l.ok ? '<span class="text-xs bg-gray-100 text-gray-500 px-2 py-0.5 rounded-full">即將推出</span>' : ''}
          ${l.ok && isDone ? '<span class="text-xs bg-green-50 text-green-600 px-2 py-0.5 rounded-full">已完成閱讀</span>' : ''}
        </div>
        <h3 class="font-bold text-gray-800 mb-1">第${l.id}課：${l.title}</h3>
        <p class="text-xs text-gray-500">${l.ref}</p>
      </div>
    </div>`;
  }).join('');

  return `
  <div class="max-w-5xl mx-auto px-4 py-8 fade-in">
    <div class="mb-8">
      <h1 class="text-2xl font-bold text-gray-800 mb-1">歡迎，${S.user.display}！</h1>
      <p class="text-gray-500 text-sm">你的學習進度：已完成 ${done} / 12 課</p>
      <div class="mt-3 w-full bg-gray-200 rounded-full h-2.5">
        <div class="bg-teal-500 h-2.5 rounded-full transition-all" style="width:${pct}%"></div>
      </div>
    </div>
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
      ${cards}
    </div>
    <p class="text-center text-xs text-gray-400 mt-10">富山平安福音堂 · 但以理書研經課程 · 經文：和合本修訂版 (RCUV)</p>
  </div>`;
}

// ================================================================
// LESSON PAGE
// ================================================================
function renderLesson() {
  const l = LESSONS.find(x => x.id === S.lessonId);
  if (!l || !l.ok) { S.view = 'dashboard'; render(); return ''; }
  const tabs = [
    {key:'reading', label:'📖 經文閱讀'},
    {key:'questions', label:'❓ 查經問題'},
    {key:'reflection', label:'💭 生命反思'}
  ];
  let tabBtns = tabs.map(t => `
    <button onclick="S.tab='${t.key}';render()"
      class="tab-btn px-4 py-2 text-sm font-medium rounded-lg whitespace-nowrap
      ${S.tab === t.key ? 'bg-teal-600 text-white shadow-sm' : 'text-gray-600 hover:bg-gray-100'}">
      ${t.label}
    </button>`).join('');

  let content = '';
  if (S.tab === 'reading') content = renderReading(l);
  else if (S.tab === 'questions') content = renderQuestions(l);
  else if (S.tab === 'reflection') content = renderReflection(l);

  return `
  <div class="max-w-3xl mx-auto px-4 py-6 fade-in">
    <button onclick="S.view='dashboard';render()" class="text-sm text-teal-600 hover:text-teal-700 mb-4 inline-flex items-center gap-1 transition">
      ← 返回課程列表
    </button>
    <div class="mb-6">
      <h1 class="text-xl font-bold text-gray-800">第${l.id}課：${l.title}</h1>
      <p class="text-sm text-gray-500 mt-1">${l.ref}　·　和合本修訂版 (RCUV)</p>
    </div>
    <div class="flex gap-2 mb-6 overflow-x-auto pb-1">${tabBtns}</div>
    ${content}
  </div>`;
}

// ================================================================
// TAB: READING
// ================================================================
function renderReading(l) {
  const verses = DANIEL[l.ch];
  if (!verses) return '<p class="text-gray-500">此章節經文尚未加入。</p>';
  const hl = getHL(S.user.name, l.id);
  const prog = getProgress(S.user.name);
  const isDone = prog[l.id];
  const colors = [
    {key:'yellow', emoji:'🟡', label:'不明白'},
    {key:'green', emoji:'🟢', label:'重要'},
    {key:'blue', emoji:'🔵', label:'感動'},
    {key:'pink', emoji:'🩷', label:'記住'},
    {key:'erase', emoji:'⚪', label:'清除'}
  ];
  let toolbar = colors.map(c => `
    <button onclick="S.marker='${c.key}';render()"
      class="marker-btn inline-flex items-center gap-1 px-3 py-1.5 rounded-full text-xs border transition
      ${S.marker === c.key ? 'active border-teal-500 bg-teal-50 font-bold' : 'border-gray-200 hover:border-gray-300'}">
      ${c.emoji} ${c.label}
    </button>`).join('');

  let verseHTML = verses.map(v => {
    const color = hl[v.v] || '';
    const hlClass = color ? 'hl-' + color : '';
    return `
    <div class="verse-row ${hlClass}" onclick="clickVerse(${l.id}, ${v.v})">
      <span class="text-teal-600 font-bold text-sm mr-2 select-none">${v.v}</span>
      <span class="bible-font text-gray-800 leading-relaxed">${v.t}</span>
    </div>`;
  }).join('');

  return `
  <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-4 mb-4">
    <p class="text-sm text-gray-500 mb-3">選擇標記工具，然後點擊經文節數來標記：</p>
    <div class="flex flex-wrap gap-2">${toolbar}</div>
  </div>
  <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-5 mb-4">
    <h3 class="font-bold text-gray-700 mb-4 text-center bible-font text-lg">但以理書 第${l.ch}章</h3>
    <div class="space-y-1">${verseHTML}</div>
  </div>
  <div class="flex items-center justify-between bg-white rounded-xl shadow-sm border border-gray-100 p-4">
    <div class="flex items-center gap-2">
      <input type="checkbox" id="cb-done" ${isDone ? 'checked' : ''} onchange="markDone(${l.id}, this.checked)"
        class="w-4 h-4 text-teal-600 rounded focus:ring-teal-500">
      <label for="cb-done" class="text-sm text-gray-700">我已完成本章閱讀</label>
    </div>
    ${isDone ? '<span class="text-green-600 text-sm">✓ 已完成</span>' : ''}
  </div>`;
}

// ================================================================
// TAB: QUESTIONS
// ================================================================
function renderQuestions(l) {
  const qs = QUESTIONS[l.id];
  if (!qs) return '<p class="text-gray-500 text-center py-10">此課的查經問題尚未加入，敬請期待。</p>';
  let currentSection = '';
  let html = '';
  qs.study.forEach((q, i) => {
    if (q.section !== currentSection) {
      currentSection = q.section;
      html += `<h3 class="font-bold text-teal-700 mt-6 mb-3 flex items-center gap-2">
        <span class="w-1.5 h-5 bg-teal-500 rounded-full inline-block"></span>${currentSection}</h3>`;
    }
    const saved = getNote(S.user.name, l.id, q.id);
    html += `
    <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-5 mb-4">
      <p class="font-medium text-gray-800 mb-3"><span class="text-teal-600 font-bold">${i+1}.</span> ${q.q}</p>
      <textarea id="ta-${q.id}" rows="4" placeholder="在此寫下你的回答…"
        oninput="autoSave('${q.id}', ${l.id}, this)"
        class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm text-gray-700 leading-relaxed">${escHTML(saved)}</textarea>
      <div class="flex items-center justify-between mt-2">
        <span id="sv-${q.id}" class="saved">&nbsp;✓ 已儲存</span>
        <button onclick="toggleAns('ans-${q.id}')" class="text-xs text-teal-600 hover:text-teal-700 font-medium transition">
          顯示 / 隱藏參考答案 ▾
        </button>
      </div>
      <div id="ans-${q.id}" class="ans-body">
        <div class="mt-3 p-4 bg-sky-50 rounded-lg border border-sky-200 text-sm text-gray-700 leading-relaxed">${q.a}</div>
      </div>
    </div>`;
  });
  return html;
}

// ================================================================
// TAB: REFLECTION
// ================================================================
function renderReflection(l) {
  const qs = QUESTIONS[l.id];
  if (!qs) return '<p class="text-gray-500 text-center py-10">此課的反思問題尚未加入，敬請期待。</p>';
  let html = `<h3 class="font-bold text-teal-700 mb-4 flex items-center gap-2">
    <span class="w-1.5 h-5 bg-teal-500 rounded-full inline-block"></span>生活應用與反思</h3>
  <p class="text-sm text-gray-500 mb-4">以下問題沒有標準答案，請安靜在神面前，誠實地寫下你的感受和回應。你的筆記只有你自己能看到。</p>`;
  qs.reflection.forEach((q, i) => {
    const saved = getNote(S.user.name, l.id, q.id);
    html += `
    <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-5 mb-4">
      <p class="font-medium text-gray-800 mb-3"><span class="text-teal-600 font-bold">${i+1}.</span> ${q.q}</p>
      <textarea id="ta-${q.id}" rows="5" placeholder="在此寫下你的反思…"
        oninput="autoSave('${q.id}', ${l.id}, this)"
        class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm text-gray-700 leading-relaxed">${escHTML(saved)}</textarea>
      <span id="sv-${q.id}" class="saved">&nbsp;✓ 已儲存</span>
      <div class="mt-3 p-3 bg-amber-50 rounded-lg border border-amber-200 text-xs text-amber-700 leading-relaxed">
        💡 <b>引導提示：</b>${q.hint}
      </div>
    </div>`;
  });
  return html;
}

// ================================================================
// ACTIONS
// ================================================================
function clickVerse(lid, vnum) {
  if (!S.marker) return;
  const hl = getHL(S.user.name, lid);
  if (S.marker === 'erase') { delete hl[vnum]; }
  else { hl[vnum] = S.marker; }
  setHL(S.user.name, lid, hl);
  render();
}

function markDone(lid, checked) {
  setProgress(S.user.name, lid, checked);
  render();
}

let saveTimers = {};
function autoSave(qid, lid, el) {
  clearTimeout(saveTimers[qid]);
  saveTimers[qid] = setTimeout(() => {
    setNote(S.user.name, lid, qid, el.value);
    const sv = document.getElementById('sv-' + qid);
    if (sv) { sv.classList.add('show'); setTimeout(() => sv.classList.remove('show'), 1500); }
  }, 400);
}

function toggleAns(id) {
  const el = document.getElementById(id);
  if (el) el.classList.toggle('open');
}

function escHTML(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ================================================================
// INIT
// ================================================================
(function() {
  const session = getStore('dan_session', null);
  if (session) { S.user = session; S.view = 'dashboard'; }
  render();
})();
</script>
</body>
</html>
