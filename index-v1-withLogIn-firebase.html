        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 15px;
            font-size: 0.78em;
            font-weight: bold;
        }
        .status-badge.not-started { background: #f5f5f5; color: #999; }
        .status-badge.in-progress { background: #fff3e0; color: #ef6c00; }
        .status-badge.done { background: #e8f5e9; color: #2e7d32; }

        .lesson-container { max-width: 800px; margin: 20px auto; padding: 0 15px; }
        .lesson-content {
            background: white;
            border-radius: 12px;
            padding: 35px;

        .lesson-content h2 {
            color: #1a237e;

            margin-bottom: 12px;

        .question label {

        .quiz-result {

            margin-top: 20px;

        .quiz-result.fail { background: #fbe9e7; color: #b71c1c; }

        .quiz-result p { font-size: 1.05em; margin-bottom: 5px; }
        .quiz-actions { margin-top: 20px; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }

        /* Loading */
        .loading { text-align: center; padding: 80px 20px; color: #888; }
        .loading h2 { font-size: 1.2em; font-weight: normal; }

        /* Hidden */
        .hidden { display: none !important; }

        /* Responsive */
        @media (max-width: 600px) {
            .header { padding: 12px 15px; }

            .lesson-nav { justify-content: center; }
        }
    </style>
</head>

    <script>
    // ==================== FIREBASE 設定 ====================
    const firebaseConfig = {
        apiKey: "AIzaSyCq-53c29i4TDDJUjL35R6QBSXvwlHkHUI",
        authDomain: "daniel-bible-study.firebaseapp.com",
        projectId: "daniel-bible-study",
        storageBucket: "daniel-bible-study.firebasestorage.app",
        messagingSenderId: "455825520749",
        appId: "1:455825520749:web:c1328bcc7ea4b39ff62764"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let currentUser = null;
    let currentLessonId = null;
    let userProgress = {};

    // ==================== 課程資料 ====================
    const lessons = [
        {
            id: 'lesson1',
            title: '第一課：但以理的立志',
            subtitle: '但以理書 第1章',
            description: '但以理在巴比倫的考驗中，如何堅守信仰？',
            content: `
                <h2>第一課：但以理的立志</h2>
                <h3>📖 經文：但以理書 1:1-21</h3>
                <div class="scripture">
                「但以理卻立志不以王的膳和王所飲的酒玷污自己，所以求太監長容他不玷污自己。」（但以理書 1:8）
                </div>
                <h3>一、歷史背景</h3>
                <p>約在公元前605年，巴比倫王尼布甲尼撒攻打耶路撒冷，將猶大王約雅敬和聖殿中的器皿擄到巴比倫。同時，他也從以色列人的宗室和貴族中選取少年人，要在巴比倫的宮廷中培養他們。</p>
                <h3>二、但以理的考驗</h3>
                <p>但以理和他的三個朋友（哈拿尼雅、米沙利、亞撒利雅）被選中，接受巴比倫的教育。他們面對的第一個考驗就是飲食的問題——王要他們吃王的膳食、喝王的酒。</p>
                <p>這對敬虔的猶太人來說是一個重大的考驗，因為王的膳食很可能包含了不潔淨的食物，甚至可能是祭過偶像的食物。</p>
                <h3>三、但以理的立志</h3>
                <p>但以理「立志」不玷污自己。這個「立志」在原文中是一個非常強烈的決心。他不是被動地接受環境，而是主動地做出信仰的選擇。</p>
                <p>值得注意的是，但以理的態度既堅定又智慧。他沒有公開反抗，而是「求」太監長容許他，並且提出了一個合理的替代方案——試用十天只吃素菜、只喝白水。</p>
                <h3>四、神的祝福</h3>
                <p>十天之後，但以理和他的朋友們面貌比其他少年人更加俊美肥胖。神也賜給他們聰明知識，但以理更有解夢的恩賜。</p>
                <p>最終，王考問他們，發現他們的智慧比通國的術士和用法術的還勝過十倍。</p>
                <h3>五、反思與應用</h3>
                <p>1. 在現今的環境中，有哪些事情可能「玷污」我們的信仰？</p>
                <p>2. 但以理的態度教導我們如何在堅持信仰的同時，以智慧與人相處？</p>
                <p>3. 我們是否相信，當我們忠於神時，神會照顧我們的需要？</p>
            `,
            quiz: [
                { question: '但以理被擄到哪個國家？', options: ['亞述', '巴比倫', '波斯', '埃及'], answer: 1 },
                { question: '但以理「立志」不做什麼？', options: ['不學巴比倫文字', '不改名字', '不以王的膳和酒玷污自己', '不向王行禮'], answer: 2 },
                { question: '但以理提出試驗多少天？', options: ['三天', '七天', '十天', '三十天'], answer: 2 },
                { question: '試驗期間但以理吃什麼？', options: ['王的膳食', '素菜和白水', '餅和魚', '只喝水不吃東西'], answer: 1 },
                { question: '王發現但以理的智慧勝過術士多少倍？', options: ['三倍', '七倍', '十倍', '百倍'], answer: 2 }
            ]
        },
        {
            id: 'lesson2',
            title: '第二課：尼布甲尼撒的夢',
            subtitle: '但以理書 第2章',
            description: '巨像之夢的解釋與預言的意義',
            content: `
                <h2>第二課：尼布甲尼撒的夢</h2>
                <h3>📖 經文：但以理書 2:1-49</h3>
                <div class="scripture">
                「只有一位在天上的神能顯明奧秘的事。他已將日後必有的事給尼布甲尼撒王指明。」（但以理書 2:28）
                </div>
                <h3>一、王的難題</h3>
                <p>尼布甲尼撒做了一個令他不安的夢，但醒來後卻記不清夢的內容。他要求術士們不但要解夢，還要先說出夢的內容，否則就要將他們全部處死。</p>
                <h3>二、但以理的禱告</h3>
                <p>但以理和三個朋友一同懇切禱告，求天上的神顯明這奧秘的事。神在夜間的異象中將奧秘啟示給但以理。</p>
                <h3>三、巨像的夢</h3>
                <p>夢中有一個巨大的像：</p>
                <p>• <strong>金頭</strong> — 代表巴比倫帝國</p>
                <p>• <strong>銀胸和銀臂</strong> — 代表瑪代波斯帝國</p>
                <p>• <strong>銅腹和銅腿</strong> — 代表希臘帝國</p>
                <p>• <strong>鐵腿</strong> — 代表羅馬帝國</p>
                <p>• <strong>半鐵半泥的腳</strong> — 代表末後分裂的國度</p>
                <p>最後有一塊「非人手鑿出來的石頭」打碎了整個像，代表神永恆的國度。</p>
                <h3>四、反思與應用</h3>
                <p>1. 面對困難時，但以理第一個反應是禱告。我們在困難中的第一反應是什麼？</p>
                <p>2. 世上的國度終會過去，唯有神的國度永遠長存。這對我們有什麼啟示？</p>
            `,
            quiz: [
                { question: '尼布甲尼撒要求術士做什麼？', options: ['只解夢', '只說出夢的內容', '說出夢的內容並解夢', '為他做新的夢'], answer: 2 },
                { question: '但以理得知夢的內容之前做了什麼？', options: ['查閱書籍', '與朋友一同禱告', '請教其他術士', '自己冥想'], answer: 1 },
                { question: '巨像的金頭代表什麼？', options: ['波斯帝國', '希臘帝國', '巴比倫帝國', '羅馬帝國'], answer: 2 },
                { question: '打碎巨像的石頭代表什麼？', options: ['另一個帝國', '神永恆的國度', '一場戰爭', '自然災害'], answer: 1 },

        {

                <p>他們相信神「能」拯救他們，但即使神選擇不拯救，他們仍然不會妥協。這是超越結果的信心。</p>

                <p>三人從火窯中出來，身上連煙火的氣味都沒有。</p>
                <h3>四、反思與應用</h3>
                <p>1. 「即便如此⋯⋯即或不然」的信心對你有什麼啟發？</p>
                <p>2. 你是否曾經面對「要麼妥協、要麼受苦」的選擇？</p>
                <p>3. 火窯中的第四個人讓我們看到：神在我們的苦難中同在。</p>
            `,
            quiz: [
                { question: '尼布甲尼撒造的金像有多高？', options: ['三十肘', '六十肘', '九十肘', '一百肘'], answer: 1 },
                { question: '不敬拜金像的人會面對什麼懲罰？', options: ['坐監', '被扔進烈火的窯中', '被驅逐出境', '被斬首'], answer: 1 },
                { question: '三人信心宣言的核心是什麼？', options: ['神一定會救我們', '我們會自己逃走', '即便神能救，即或不然也不拜', '我們會找人幫忙'], answer: 2 },
                { question: '火窯中出現了幾個人？', options: ['三個', '四個', '五個', '六個'], answer: 1 },
                { question: '三人從火窯出來後身上有什麼？', options: ['嚴重燒傷', '輕微燒傷', '衣服燒焦', '連煙火的氣味都沒有'], answer: 3 }
            ]
        },
        {
            id: 'lesson4',

            description: '驕傲的代價與悔改的恩典',
            content: `

                <h3>四、悔改與恢復</h3>
                <p>七年之後，尼布甲尼撒舉目望天，理智恢復了。他稱頌讚美神，承認神的主權，王位也復歸於他。</p>
                <h3>五、反思與應用</h3>
                <p>1. 驕傲是一種怎樣的罪？為什麼神特別厭惡驕傲？</p>

                <p>3. 尼布甲尼撒的經歷告訴我們，認識神的主權有多重要？</p>
            `,
            quiz: [
                { question: '尼布甲尼撒夢見什麼？', options: ['一座山', '一棵大樹', '一條河', '一隻獸'], answer: 1 },
                { question: '大樹被砍伐代表什麼？', options: ['國家滅亡', '王因驕傲被降卑', '戰爭失敗', '聖殿被毀'], answer: 1 },
                { question: '尼布甲尼撒要經過多久才恢復？', options: ['三期', '五期', '七期', '十二期'], answer: 2 },
                { question: '預言應驗時王在做什麼？', options: ['睡覺', '禱告', '自誇巴比倫的偉大', '打仗'], answer: 2 },
                { question: '王恢復理智後做的第一件事？', options: ['懲罰大臣', '重建宮殿', '稱頌讚美至高者', '攻打他國'], answer: 2 }
            ]
        }
    ];

    // ==================== 登入/註冊功能 ====================

    function switchTab(tab) {
        document.getElementById('tab-login').classList.toggle('active', tab === 'login');
        document.getElementById('tab-register').classList.toggle('active', tab === 'register');
        document.getElementById('login-form').classList.toggle('hidden', tab !== 'login');
        document.getElementById('register-form').classList.toggle('hidden', tab !== 'register');
        document.getElementById('login-error').classList.add('hidden');
        document.getElementById('register-error').classList.add('hidden');
    }

    async function register() {
        const name = document.getElementById('reg-name').value.trim();
        const email = document.getElementById('reg-email').value.trim();
        const password = document.getElementById('reg-password').value;
        const confirm = document.getElementById('reg-password-confirm').value;
        const errorEl = document.getElementById('register-error');
        errorEl.classList.add('hidden');

        if (!name || !email || !password) {
            showError(errorEl, '請填寫所有欄位'); return;
        }
        if (password !== confirm) {
            showError(errorEl, '兩次輸入的密碼不一致'); return;
        }
        if (password.length < 6) {
            showError(errorEl, '密碼至少需要6個字元'); return;
        }

        try {
            const cred = await auth.createUserWithEmailAndPassword(email, password);
            await db.collection('users').doc(cred.user.uid).set({
                displayName: name,
                email: email,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
        } catch (error) {
            const msgs = {
                'auth/email-already-in-use': '此電郵已被註冊',
                'auth/invalid-email': '電郵格式不正確',
                'auth/weak-password': '密碼強度不足'
            };
            showError(errorEl, msgs[error.code] || '註冊失敗：' + error.message);
        }
    }

    async function login() {
        const email = document.getElementById('login-email').value.trim();
        const password = document.getElementById('login-password').value;
        const errorEl = document.getElementById('login-error');
        errorEl.classList.add('hidden');

        if (!email || !password) {
            showError(errorEl, '請填寫所有欄位'); return;
        }

        try {
            await auth.signInWithEmailAndPassword(email, password);
        } catch (error) {
            const msgs = {
                'auth/user-not-found': '找不到此用戶',
                'auth/wrong-password': '密碼錯誤',
                'auth/invalid-email': '電郵格式不正確',
                'auth/invalid-credential': '電郵或密碼錯誤'
            };
            showError(errorEl, msgs[error.code] || '登入失敗：' + error.message);
        }
    }

    async function logout() {
        if (confirm('確定要登出嗎？')) {
            await auth.signOut();
        }
    }

    function showError(el, msg) {
        el.textContent = msg;
        el.classList.remove('hidden');
    }

    // ==================== 監聽登入狀態 ====================
    auth.onAuthStateChanged(async (user) => {
        document.getElementById('loading-section').classList.add('hidden');

        if (user) {
            currentUser = user;
            const userDoc = await db.collection('users').doc(user.uid).get();
            const userData = userDoc.data();
            document.getElementById('display-name').textContent =
                '👤 ' + (userData?.displayName || user.email);

            await loadProgress();
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('main-header').classList.remove('hidden');
            showDashboard();
        } else {
            currentUser = null;
            userProgress = {};
            document.getElementById('auth-section').classList.remove('hidden');
            document.getElementById('main-header').classList.add('hidden');
            document.getElementById('dashboard-section').classList.add('hidden');
            document.getElementById('lesson-section').classList.add('hidden');
            document.getElementById('quiz-section').classList.add('hidden');
        }
    });

    // ==================== 進度管理 ====================
    async function loadProgress() {
        userProgress = {};
        const snapshot = await db.collection('users').doc(currentUser.uid)
            .collection('progress').get();
        snapshot.forEach(doc => { userProgress[doc.id] = doc.data(); });
    }

    async function saveProgress(lessonId, data) {
        await db.collection('users').doc(currentUser.uid)
            .collection('progress').doc(lessonId).set(data, { merge: true });
        userProgress[lessonId] = { ...userProgress[lessonId], ...data };
    }

    // ==================== 主頁面 ====================
    function showDashboard() {
        document.getElementById('dashboard-section').classList.remove('hidden');
        document.getElementById('lesson-section').classList.add('hidden');
        document.getElementById('quiz-section').classList.add('hidden');
        updateDashboard();
    }

    function updateDashboard() {
        const grid = document.getElementById('lessons-grid');
        grid.innerHTML = '';

        let completedCount = 0;
        let totalScore = 0;
        let scoredCount = 0;

        lessons.forEach(lesson => {
            const progress = userProgress[lesson.id] || {};
            let statusClass = 'not-started';
            let statusText = '未開始';

            if (progress.completed) {
                statusClass = 'done'; statusText = '✅ 已完成'; completedCount++;
            } else if (progress.lastAccess) {
                statusClass = 'in-progress'; statusText = '📖 進行中';
            }

            if (progress.quizScore != null) {
                totalScore += progress.quizScore;
                scoredCount++;
            }

            const card = document.createElement('div');
            card.className = `lesson-card ${progress.completed ? 'completed' : ''}`;
            card.onclick = () => showLesson(lesson.id);
            card.innerHTML = `
                <h3>${lesson.title}</h3>
                <div class="subtitle">${lesson.subtitle}</div>
                <div class="description">${lesson.description}</div>
                <div class="card-footer">
                    <span class="status-badge ${statusClass}">${statusText}</span>
                    ${progress.quizScore != null ?
                        `<span class="status-badge score">測驗：${progress.quizScore}%</span>` : ''}
                </div>
            `;
            grid.appendChild(card);
        });

        const pct = Math.round((completedCount / lessons.length) * 100);
        const bar = document.getElementById('overall-progress');
        bar.style.width = Math.max(pct, 2) + '%';
        bar.textContent = pct + '%';
        document.getElementById('completed-count').textContent = completedCount;
        document.getElementById('total-count').textContent = lessons.length;
        document.getElementById('avg-score').textContent =
            scoredCount > 0 ? Math.round(totalScore / scoredCount) + '%' : '--';
    }

    // ==================== 課文頁面 ====================
    function showLesson(lessonId) {
        currentLessonId = lessonId;
        const lesson = lessons.find(l => l.id === lessonId);
        if (!lesson) return;

        document.getElementById('lesson-content').innerHTML = lesson.content;

        const idx = lessons.findIndex(l => l.id === lessonId);
        document.getElementById('prev-lesson-btn').style.display = idx > 0 ? '' : 'none';
        document.getElementById('next-lesson-btn').style.display = idx < lessons.length - 1 ? '' : 'none';

        document.getElementById('dashboard-section').classList.add('hidden');
        document.getElementById('lesson-section').classList.remove('hidden');
        document.getElementById('quiz-section').classList.add('hidden');

        saveProgress(lessonId, { lastAccess: firebase.firestore.FieldValue.serverTimestamp() });
        window.scrollTo(0, 0);
    }

    function prevLesson() {
        const idx = lessons.findIndex(l => l.id === currentLessonId);
        if (idx > 0) showLesson(lessons[idx - 1].id);
    }
    function nextLesson() {
        const idx = lessons.findIndex(l => l.id === currentLessonId);
        if (idx < lessons.length - 1) showLesson(lessons[idx + 1].id);
    }

    // ==================== 測驗系統 ====================
    function startQuiz() {
        const lesson = lessons.find(l => l.id === currentLessonId);
        if (!lesson?.quiz) return;

        let html = `
            <h2>📝 ${lesson.title} — 測驗</h2>
            <p class="quiz-subtitle">共 ${lesson.quiz.length} 題，60% 或以上為合格</p>
        `;

        lesson.quiz.forEach((q, i) => {
            html += `<div class="question">
                <p class="q-text">${i + 1}. ${q.question}</p>
                ${q.options.map((opt, j) => `
                    <label><input type="radio" name="q${i}" value="${j}"> ${opt}</label>
                `).join('')}
            </div>`;
        });

        html += `
            <div id="quiz-result" class="hidden"></div>
            <div class="quiz-actions">
                <button class="btn btn-success" onclick="submitQuiz()" id="submit-quiz-btn">✅ 提交答案</button>
                <button class="btn btn-warning hidden" onclick="startQuiz()" id="retry-quiz-btn">🔄 重新測驗</button>
                <button class="btn btn-primary hidden" onclick="showDashboard()" id="back-dashboard-btn">📚 返回課程列表</button>
            </div>
        `;

        document.getElementById('quiz-content').innerHTML = html;
        document.getElementById('lesson-section').classList.add('hidden');
        document.getElementById('quiz-section').classList.remove('hidden');
        window.scrollTo(0, 0);
    }

    async function submitQuiz() {
        const lesson = lessons.find(l => l.id === currentLessonId);
        if (!lesson) return;

        let correct = 0;
        let allAnswered = true;

        lesson.quiz.forEach((q, i) => {
            const sel = document.querySelector(`input[name="q${i}"]:checked`);
            if (!sel) { allAnswered = false; return; }
            if (parseInt(sel.value) === q.answer) correct++;
        });

        if (!allAnswered) { alert('請回答所有問題！'); return; }

        const score = Math.round((correct / lesson.quiz.length) * 100);
        const passed = score >= 60;

        // Show result
        const resultEl = document.getElementById('quiz-result');
        resultEl.className = `quiz-result ${passed ? 'pass' : 'fail'}`;
        resultEl.innerHTML = `
            <h3>${passed ? '🎉 恭喜通過！' : '😔 未能通過'}</h3>
            <p>你的分數：<strong>${score}%</strong>（${correct}/${lesson.quiz.length}）</p>
            <p>${passed ? '太棒了！繼續下一課的學習吧！' : '請重新溫習課文後再試一次。加油！'}</p>
        `;
        resultEl.classList.remove('hidden');

        // Highlight answers
        lesson.quiz.forEach((q, i) => {
            document.querySelectorAll(`input[name="q${i}"]`).forEach((input, j) => {
                input.disabled = true;
                if (j === q.answer) {
                    input.parentElement.style.background = '#e8f5e9';
                    input.parentElement.style.borderColor = '#43a047';
                } else if (input.checked) {
                    input.parentElement.style.background = '#fbe9e7';
                    input.parentElement.style.borderColor = '#e53935';
                }
            });
        });

        document.getElementById('submit-quiz-btn').classList.add('hidden');
        document.getElementById('retry-quiz-btn').classList.remove('hidden');
        document.getElementById('back-dashboard-btn').classList.remove('hidden');

        // Save to Firestore
        await saveProgress(currentLessonId, {
            quizScore: score,
            completed: passed,
            completedAt: passed ? firebase.firestore.FieldValue.serverTimestamp() : null
        });
        updateDashboard();
    }
    </script>
</body>
